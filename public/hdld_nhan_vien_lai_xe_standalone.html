<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HĐLĐ nhân viên lái xe</title>
    <script src="/runtime-config.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
      :root { --brand: #4338ca; --ink: #172033; --muted: #667085; --line: #e4e7ec; --bg: #f6f7f9; --danger: #b42318; }
      @page { size: A4; margin: 1.5cm; }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--ink); font-family: Arial, sans-serif; }
      .shell { width: 100%; margin: 0 auto; padding: 12px; }
      .toolbar { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; gap: 16px; border: 1px solid var(--line); border-radius: 12px; background: rgba(255,255,255,.96); padding: 14px; box-shadow: 0 10px 28px rgba(16,24,40,.06); backdrop-filter: blur(10px); }
      .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
      .brand img { width: 42px; height: 42px; border-radius: 10px; object-fit: contain; }
      h1 { margin: 0; font-size: 18px; }
      .status { margin-top: 4px; color: var(--muted); font-size: 13px; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; }
      button { min-height: 40px; border: 0; border-radius: 10px; background: var(--brand); color: #fff; cursor: pointer; font-weight: 700; padding: 0 14px; }
      button.secondary { border: 1px solid var(--line); background: #fff; color: var(--ink); }
      button:disabled { cursor: not-allowed; opacity: .55; }
      .message { margin-top: 16px; border: 1px dashed var(--line); border-radius: 12px; background: #fff; padding: 24px; color: var(--muted); text-align: center; }
      .message.danger { border-color: #fecdca; background: #fffbfa; color: var(--danger); }
      .preview { margin-top: 16px; overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; background: #eef2f7; padding: 0; }
      .page { width: 21cm; min-height: 29.7cm; margin: 0 auto; background: #fff; padding: 1.6cm 1.8cm 1.6cm 2.2cm; color: #000; font-family: "Times New Roman", Times, serif; font-size: 13pt; line-height: 1.35; box-shadow: none; }
      .center { text-align: center; }
      .bold { font-weight: 700; }
      .title { margin: 10px 0 6px; text-align: center; font-size: 16pt; font-weight: 700; text-transform: uppercase; }
      .row { margin: 4px 0; text-align: justify; }
      .line { margin: 3px 0; }
      .section { margin-top: 8px; }
      .indent { padding-left: 24px; }
      .subtitle { margin-top: 4px; font-weight: 700; }
      .sign-table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 24px; }
      .sign-table td { text-align: center; vertical-align: top; }
      .sign-title { font-weight: 700; text-transform: uppercase; }
      .sign-note { margin-top: 4px; font-style: italic; }
      .sign-space { height: 84px; }
      @media print {
        html, body { width: auto !important; height: auto !important; overflow: visible !important; background: #fff !important; }
        .toolbar, .message { display: none !important; }
        .shell, .preview { margin: 0 !important; padding: 0 !important; border: 0 !important; background: #fff !important; overflow: visible !important; }
        .page { width: auto !important; min-height: 0 !important; margin: 0 !important; padding: 0 !important; }
      }
    </style>
    <link rel="stylesheet" href="/document-preview-responsive.css" />
  </head>
  <body>
    <div class="shell">
      <div class="toolbar">
        <div class="brand">
          <img src="/logo-taxi-123.png" alt="TAXI 123_HN" />
          <div>
            <h1>HĐLĐ nhân viên lái xe</h1>
            <div class="status" id="statusText">Đang kiểm tra tham số ID_HopDongLaoDong.</div>
          </div>
        </div>
        <div class="actions">
          <button class="secondary" type="button" onclick="window.print()" id="printButton" disabled>In tài liệu</button>
          <button type="button" onclick="exportWord()" id="exportButton" disabled>Xuất Word</button>
        </div>
      </div>
      <div id="message" class="message">Đang tải dữ liệu...</div>
      <div id="preview" class="preview" hidden></div>
    </div>

    <script>
      const idHopDongLaoDong = new URLSearchParams(window.location.search).get('ID_HopDongLaoDong') || '';
      const statusText = document.getElementById('statusText');
      const message = document.getElementById('message');
      const preview = document.getElementById('preview');
      const printButton = document.getElementById('printButton');
      const exportButton = document.getElementById('exportButton');
      let currentPayload = null;

      function cleanValue(value) {
        if (value === null || value === undefined) return '';
        return String(value).trim();
      }

      function parseDateValue(value) {
        if (!value) return null;
        if (value instanceof Date) {
          const dateValue = new Date(value.getTime());
          return Number.isNaN(dateValue.getTime()) ? null : dateValue;
        }

        const text = String(value).trim();
        if (!text) return null;

        const isoDateMatch = text.match(/^(\d{4})-(\d{1,2})-(\d{1,2})(?:[T\s].*)?$/);
        if (isoDateMatch) {
          const [, year, month, day] = isoDateMatch;
          const dateValue = new Date(Number(year), Number(month) - 1, Number(day));
          if (
            dateValue.getFullYear() === Number(year) &&
            dateValue.getMonth() === Number(month) - 1 &&
            dateValue.getDate() === Number(day)
          ) {
            return dateValue;
          }
        }

        const vietnameseDateMatch = text.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{4})(?:\s+.*)?$/);
        if (vietnameseDateMatch) {
          const [, day, month, year] = vietnameseDateMatch;
          const dateValue = new Date(Number(year), Number(month) - 1, Number(day));
          if (
            dateValue.getFullYear() === Number(year) &&
            dateValue.getMonth() === Number(month) - 1 &&
            dateValue.getDate() === Number(day)
          ) {
            return dateValue;
          }
        }

        const parsed = new Date(text);
        return Number.isNaN(parsed.getTime()) ? null : parsed;
      }

      function formatAdministrativeDate(value) {
        const date = parseDateValue(value);
        if (!date) return { day: '', month: '', year: '' };
        const day = String(date.getDate()).padStart(2, '0');
        const monthValue = date.getMonth() + 1;
        const month = monthValue <= 2 ? String(monthValue).padStart(2, '0') : String(monthValue);
        return { day, month, year: String(date.getFullYear()) };
      }

      function formatAdministrativeDateString(value) {
        const date = formatAdministrativeDate(value);
        if (!date.day || !date.month || !date.year) return '';
        return `${date.day}/${date.month}/${date.year}`;
      }

      function formatMoney(value) {
        const digits = cleanValue(value).replace(/[^\d]/g, '');
        if (!digits) return '';
        return Number(digits).toLocaleString('vi-VN');
      }

      const digitsText = ['không', 'một', 'hai', 'ba', 'bốn', 'năm', 'sáu', 'bảy', 'tám', 'chín'];
      const scalesText = ['', ' nghìn', ' triệu', ' tỷ', ' nghìn tỷ', ' triệu tỷ'];

      function normalizeSpaces(value) {
        return value.replace(/\s+/g, ' ').trim();
      }

      function readTriple(number, isFull) {
        const hundreds = Math.floor(number / 100);
        const tensUnits = number % 100;
        const tens = Math.floor(tensUnits / 10);
        const units = tensUnits % 10;
        const parts = [];
        if (hundreds > 0 || isFull) parts.push(`${digitsText[hundreds]} trăm`);
        if (tens > 1) {
          parts.push(`${digitsText[tens]} mươi`);
          if (units === 1) parts.push('mốt');
          else if (units === 4) parts.push('tư');
          else if (units === 5) parts.push('lăm');
          else if (units > 0) parts.push(digitsText[units]);
          return normalizeSpaces(parts.join(' '));
        }
        if (tens === 1) {
          parts.push('mười');
          if (units === 5) parts.push('lăm');
          else if (units > 0) parts.push(digitsText[units]);
          return normalizeSpaces(parts.join(' '));
        }
        if (units > 0) {
          if (hundreds > 0 || isFull) parts.push('lẻ');
          parts.push(digitsText[units]);
        }
        return normalizeSpaces(parts.join(' '));
      }

      function numberToWords(value) {
        const normalized = String(value ?? '').replace(/[^\d]/g, '').replace(/^0+/, '') || '0';
        if (normalized === '0') return 'Không';
        const groups = [];
        let remaining = normalized;
        while (remaining.length > 0) {
          groups.unshift(Number(remaining.slice(-3)));
          remaining = remaining.slice(0, -3);
        }
        const firstNonZeroIndex = groups.findIndex((group) => group > 0);
        const parts = [];
        groups.forEach((group, index) => {
          if (!group) return;
          const scaleIndex = groups.length - index - 1;
          parts.push(`${readTriple(group, index > firstNonZeroIndex)}${scalesText[scaleIndex] || ''}`);
        });
        const sentence = normalizeSpaces(parts.join(' '));
        return sentence.charAt(0).toUpperCase() + sentence.slice(1);
      }

      function buildMap(rows, keyName) {
        return new Map((Array.isArray(rows) ? rows : []).map((row) => [cleanValue(row[keyName]), row]).filter(([id]) => id));
      }

      function getNhanSuDisplayName(nhanSu) {
        if (!nhanSu) return '';
        return cleanValue(nhanSu.HoTen) || cleanValue(nhanSu.Display) || cleanValue(nhanSu.ID_NhanSu);
      }

      function getDonViDisplayName(donVi) {
        if (!donVi) return '';
        return cleanValue(donVi.TenDonVi) || cleanValue(donVi.Display) || cleanValue(donVi.ID_DonVi);
      }

      function getChucDanhDisplayName(chucDanh) {
        if (!chucDanh) return '';
        return cleanValue(chucDanh.TenChucDanh) || cleanValue(chucDanh.Display) || cleanValue(chucDanh.ID_ChucDanh);
      }

      function getBoPhanDisplayName(boPhan) {
        if (!boPhan) return '';
        return cleanValue(boPhan.TenBoPhan) || cleanValue(boPhan.Display) || cleanValue(boPhan.ID_BoPhan);
      }

      function normalizeVietnameseText(value) {
        return cleanValue(value)
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/đ/g, 'd')
          .replace(/Đ/g, 'D')
          .toLowerCase();
      }

      function isIndefiniteContractType(value) {
        return normalizeVietnameseText(value) === 'khong xac dinh thoi han';
      }

      function buildThoiHanHopDongText(loaiHopDong, ngayBatDauText, ngayKetThucText) {
        const batDau = cleanValue(ngayBatDauText);
        const ketThuc = cleanValue(ngayKetThucText);
        const batDauText = batDau ? `từ ngày ${batDau}` : 'từ ngày';
        if (isIndefiniteContractType(loaiHopDong)) return batDauText;
        return ketThuc ? `${batDauText} đến ngày ${ketThuc}` : `${batDauText} đến ngày`;
      }

      function pickGplxForNhanSu(gplxRows, nhanSuId) {
        const targetId = cleanValue(nhanSuId);
        if (!targetId) return null;

        const rows = (Array.isArray(gplxRows) ? gplxRows : [])
          .filter((row) => cleanValue(row?.Ref_NhanSu) === targetId);
        if (rows.length === 0) return null;

        const activeRow = rows.find((row) => normalizeVietnameseText(row?.TrangThai).includes('dang hieu luc'));
        if (activeRow) return activeRow;

        return [...rows].sort((a, b) => {
          const dateA = parseDateValue(a?.NgayHetHan);
          const dateB = parseDateValue(b?.NgayHetHan);
          return (dateB ? dateB.getTime() : 0) - (dateA ? dateA.getTime() : 0);
        })[0] || rows[0];
      }

      function normalizeLookupText(value) {
        return cleanValue(value).toLowerCase();
      }

      function findDonVi(donViById, value) {
        const ref = cleanValue(value);
        if (!ref) return null;
        const direct = donViById.get(ref);
        if (direct) return direct;
        const normalizedRef = normalizeLookupText(ref);
        for (const donVi of donViById.values()) {
          const candidates = [donVi.ID_DonVi, donVi.MaDonVi, donVi.TenDonVi, donVi.TenVietTat].map(normalizeLookupText).filter(Boolean);
          if (
            candidates.some((candidate) => candidate === normalizedRef) ||
            candidates.some((candidate) => normalizedRef.includes(candidate) || candidate.includes(normalizedRef))
          ) {
            return donVi;
          }
        }
        return null;
      }

      async function fetchBundle() {
        const params = new URLSearchParams({ ID_HopDongLaoDong: idHopDongLaoDong });
        const response = await fetch(`/api/hdld-nhan-vien-lai-xe?${params.toString()}`, {
          method: 'GET',
          headers: { Accept: 'application/json' }
        });
        const contentType = response.headers.get('content-type') || '';
        const text = await response.text();
        if (!contentType.includes('application/json')) {
          throw new Error('Route /api/hdld-nhan-vien-lai-xe chưa trả JSON hợp lệ trong môi trường hiện tại.');
        }
        const data = text ? JSON.parse(text) : {};
        if (!response.ok) throw new Error(data.error || `Không tải được dữ liệu HĐLĐ (${response.status}).`);
        return data;
      }

      function buildPayload(row, related = {}) {
        const nhanSuById = buildMap(related.NHANSU, 'ID_NhanSu');
        const donViById = buildMap(related.DONVI, 'ID_DonVi');
        const chucDanhById = buildMap(related.DM_CHUCDANH, 'ID_ChucDanh');
        const boPhanById = buildMap(related.DM_BOPHAN, 'ID_BoPhan');
        const mucLuongById = buildMap(related.DM_MUCLUONG_DONGBHXH, 'ID_MucLuong');
        const nhanSuId = cleanValue(row.Ref_NhanSu);
        const nhanSu = nhanSuById.get(nhanSuId);
        const nguoiKy = nhanSuById.get(cleanValue(row.Ref_NguoiKy));
        const donVi = findDonVi(donViById, row.Ref_DonViLamViec);
        const chucDanh = chucDanhById.get(cleanValue(nhanSu?.Ref_ChucDanh)) || chucDanhById.get(cleanValue(row.Ref_BoPhan));
        const nguoiKyChucDanh = chucDanhById.get(cleanValue(nguoiKy?.Ref_ChucDanh));
        const boPhan = boPhanById.get(cleanValue(row.Ref_BoPhan)) || boPhanById.get(cleanValue(chucDanh?.Ref_BoPhan));
        const mucLuong = mucLuongById.get(cleanValue(row.MucLuongCoBan));
        const gplx = pickGplxForNhanSu(related.LAIXE_GPLX, nhanSuId);
        const salaryDigits = cleanValue(mucLuong?.MucLuong).replace(/[^\d]/g, '');
        const ngayKy = formatAdministrativeDate(row.NgayKy);
        const tenDonVi = getDonViDisplayName(donVi) || cleanValue(row.Ref_DonViLamViec);
        const missingSalary = Boolean(cleanValue(row.MucLuongCoBan) && !mucLuong);
        const loaiHopDong = cleanValue(row.LoaiHopDong);
        const ngayBatDauText = formatAdministrativeDateString(row.NgayBatDau);
        const ngayKetThucText = formatAdministrativeDateString(row.NgayKetThuc);
        return {
          idHopDongLaoDong: cleanValue(row.ID_HopDongLaoDong),
          soHopDong: cleanValue(row.SoHopDong) || cleanValue(nhanSu?.CCCD) || cleanValue(row.ID_HopDongLaoDong),
          ngayKy,
          ngayKyText: formatAdministrativeDateString(row.NgayKy),
          ngayBatDauText,
          ngayKetThucText,
          thoiHanHopDongText: buildThoiHanHopDongText(loaiHopDong, ngayBatDauText, ngayKetThucText),
          tenDonVi,
          tenDonViUpper: tenDonVi.toUpperCase(),
          maSoThueDonVi: cleanValue(donVi?.MaSoThue) || cleanValue(donVi?.MaDonVi),
          diaChiDonVi: cleanValue(donVi?.DiaChi),
          hoTenNguoiKy: getNhanSuDisplayName(nguoiKy) || cleanValue(donVi?.NguoiDaiDien),
          chucVuNguoiKy: getChucDanhDisplayName(nguoiKyChucDanh) || cleanValue(donVi?.ChucVuNguoiDaiDien),
          hoTenNhanSu: getNhanSuDisplayName(nhanSu) || cleanValue(row.Ref_NhanSu),
          ngaySinh: formatAdministrativeDateString(nhanSu?.NgaySinh),
          diaChiNhanSu: cleanValue(nhanSu?.Dia_Chi_Day_Du) || cleanValue(nhanSu?.Address),
          soCccd: cleanValue(nhanSu?.CCCD),
          ngayCapCccd: formatAdministrativeDateString(nhanSu?.NgayCapCCCD),
          noiCapCccd: cleanValue(nhanSu?.NoiCapCCCD),
          soGplx: cleanValue(gplx?.SoGPLX),
          hangGplx: cleanValue(gplx?.HangGPLX),
          chucDanh: getChucDanhDisplayName(chucDanh) || cleanValue(row.Ref_BoPhan),
          boPhan: getBoPhanDisplayName(boPhan),
          loaiHopDong,
          mucLuongText: formatMoney(mucLuong?.MucLuong),
          mucLuongBangChu: salaryDigits ? `${numberToWords(salaryDigits)} đồng` : '',
          missingSalary,
          missingSalaryMessage: missingSalary ? `Không tìm thấy mã lương ${cleanValue(row.MucLuongCoBan)} trong bảng DM_MUCLUONG_DONGBHXH. Phần mức lương sẽ để trống khi xuất Word.` : '',
          trangThaiXuLy: cleanValue(row.TrangThaiXuLy),
          ghiChu: cleanValue(row.GhiChu)
        };
      }

      function buildTemplateData(payload) {
        return {
          so_hop_dong: payload.soHopDong,
          ngay_ky_text: payload.ngayKyText,
          ngay_ky: payload.ngayKy.day,
          thang_ky: payload.ngayKy.month,
          nam_ky: payload.ngayKy.year,
          ten_don_vi: payload.tenDonVi,
          ten_don_vi_upper: payload.tenDonViUpper,
          ma_so_thue_don_vi: payload.maSoThueDonVi,
          dia_chi_don_vi: payload.diaChiDonVi,
          ho_ten_nguoi_ky: payload.hoTenNguoiKy,
          chuc_vu_nguoi_ky: payload.chucVuNguoiKy,
          ho_ten_nhan_su: payload.hoTenNhanSu,
          ngay_sinh: payload.ngaySinh,
          dia_chi_nhan_su: payload.diaChiNhanSu,
          so_cccd: payload.soCccd,
          ngay_cap_cccd: payload.ngayCapCccd,
          noi_cap_cccd: payload.noiCapCccd,
          so_gplx: payload.soGplx,
          hang_gplx: payload.hangGplx,
          chuc_danh: payload.chucDanh,
          bo_phan: payload.boPhan,
          loai_hop_dong: payload.loaiHopDong,
          ngay_bat_dau: payload.ngayBatDauText,
          ngay_ket_thuc: payload.ngayKetThucText,
          thoi_han_hop_dong: payload.thoiHanHopDongText,
          muc_luong: payload.mucLuongText,
          muc_luong_bang_chu: payload.mucLuongBangChu,
          trang_thai: payload.trangThaiXuLy,
          ghi_chu: payload.ghiChu
        };
      }

      function normalizeDocxZipEntryNames(zip) {
        const normalizedZip = new PizZip();
        Object.entries(zip.files).forEach(([entryName, file]) => {
          if (file.dir) return;
          normalizedZip.file(entryName.replace(/\\/g, '/'), file.asUint8Array());
        });
        return normalizedZip;
      }

      function normalizeFileNamePart(value) {
        return String(value || '')
          .trim()
          .replace(/[\\/:*?"<>|]+/g, '')
          .replace(/\s+/g, '_')
          .replace(/^_+|_+$/g, '');
      }

      function buildExportFileName(payload) {
        const personName = normalizeFileNamePart(payload && payload.hoTenNhanSu);
        const identifier = normalizeFileNamePart((payload && (payload.soHopDong || payload.idHopDongLaoDong)) || 'new');
        return ['HDLD_nhan_vien_lai_xe', personName, identifier].filter(Boolean).join('_') + '.docx';
      }

      function render(payload) {
        currentPayload = payload;
        preview.hidden = false;
        message.hidden = true;
        printButton.disabled = false;
        exportButton.disabled = false;
        preview.innerHTML = `
          <div class="page">
            <div class="center bold">CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</div>
            <div class="center bold">Độc lập - Tự do - Hạnh phúc</div>
            <div class="center">-----o0o-----</div>
            <div class="title">HỢP ĐỒNG LAO ĐỘNG</div>
            <div class="center">Số: ${payload.soHopDong || '...'}</div>
            <div class="section">
              <div class="line">Căn cứ:</div>
              <div class="line">- Bộ luật Lao động số 45/2019/QH14 ngày 20/11/2019;</div>
              <div class="line">- Căn cứ Nội quy lao động của Công ty có hiệu lực từ ngày 31/05/2026;</div>
              <div class="line">- Căn cứ nhu cầu và năng lực của hai bên;</div>
            </div>
            <div class="row">Hôm nay, ngày ${payload.ngayKy.day || '...'} tháng ${payload.ngayKy.month || '...'} năm ${payload.ngayKy.year || '...'}, tại ${payload.tenDonVi || '................................'}, chúng tôi gồm:</div>
            <div class="section">
              <div class="line"><strong>BÊN A:</strong> ${payload.tenDonViUpper || ''}</div>
              <div class="line">- Địa chỉ: ${payload.diaChiDonVi || ''}</div>
              <div class="line">- MST: ${payload.maSoThueDonVi || ''}</div>
              <div class="line">- Đại diện: Ông/Bà ${payload.hoTenNguoiKy || ''} &nbsp;&nbsp;&nbsp;&nbsp; Chức danh: ${payload.chucVuNguoiKy || ''}</div>
              <div class="line">("Người sử dụng lao động" hoặc "NSDLĐ")</div>
              <div class="line bold">VÀ</div>
            </div>
            <div class="section">
              <div class="line"><strong>BÊN B:</strong> Ông/Bà ${payload.hoTenNhanSu || ''}</div>
              <div class="line">- Ngày sinh: ${payload.ngaySinh || ''}</div>
              <div class="line">- Địa chỉ: ${payload.diaChiNhanSu || ''}</div>
              <div class="line">- CCCD: ${payload.soCccd || ''} &nbsp;&nbsp; Ngày cấp: ${payload.ngayCapCccd || ''} &nbsp;&nbsp; Nơi cấp: ${payload.noiCapCccd || ''}</div>
              <div class="line">- Số GPLX: ${payload.soGplx || ''} &nbsp;&nbsp; Hạng bằng: ${payload.hangGplx || ''}</div>
              <div class="line">("Người lao động" hoặc "NLĐ")</div>
            </div>
            <div class="section">
              <div class="line">Sau khi thỏa thuận, hai Bên thống nhất ký Hợp đồng lao động (HĐLĐ) với các điều khoản sau:</div>
              <div class="line"><strong>Điều 1. Công việc, địa điểm và thời gian làm việc</strong></div>
              <div class="line">1.1. Chức danh: ${payload.chucDanh || ''}</div>
              <div class="line">1.2. Mô tả công việc:</div>
              <div class="line indent">- Thực hiện vận chuyển hành khách theo sự điều hành của Công ty thông qua các ứng dụng, tổng đài điều phối.</div>
              <div class="line indent">- Quản lý, sử dụng phương tiện được giao đúng mục đích; bảo quản tài sản, trang thiết bị, giấy tờ xe.</div>
              <div class="line indent">- Thực hiện các nghĩa vụ liên quan đến an toàn giao thông, an toàn lao động, phòng chống cháy nổ theo quy định và tuân theo nội quy, quy chế của Công ty.</div>
              <div class="line indent">- Thực hiện các công việc khác có liên quan theo sự phân công hợp lý của Công ty.</div>
              <div class="line">1.3. Địa điểm làm việc:</div>
              <div class="line indent">- Người lao động hoạt động trực, chờ, đón khách trong phạm vi địa bàn Công ty khai thác thị trường, ký kết hợp đồng cung cấp dịch vụ, hợp đồng điểm đỗ,... và trả khách theo nhu cầu của khách hàng.</div>
              <div class="line indent">- Người lao động chấp nhận việc điều động, phân công địa điểm hoạt động, khu vực đón trả khách theo yêu cầu sản xuất kinh doanh của Công ty.</div>
              <div class="line">1.4. Thời gian làm việc</div>
              <div class="line indent">- Thời gian làm việc: 48 giờ/tuần.</div>
              <div class="line indent">- Thời gian làm việc, nghỉ ngơi giữa ca được bố trí linh hoạt, phù hợp đặc thù vận tải và không làm thay đổi tổng thời giờ làm việc theo quy định pháp luật.</div>
              <div class="line indent">- Người sử dụng lao động được sử dụng người lao động làm thêm giờ khi được sự đồng ý của người lao động và đảm bảo số giờ làm thêm theo đúng quy định của Pháp luật.</div>
              <div class="line indent">- Người lao động có trách nhiệm tuân thủ quy định về thời gian lái xe liên tục, thời gian tối đa làm việc trong ngày và thời gian nghỉ giữa ca theo quy định của pháp luật về giao thông đường bộ và quy định nội bộ của Công ty.</div>
            </div>
            <div class="section">
              <div class="line"><strong>Điều 2. Thời hạn hợp đồng</strong></div>
              <div class="line indent">- Loại hợp đồng lao động: ${payload.loaiHopDong || ''}.</div>
              <div class="line indent">- Thời hạn hợp đồng lao động: ${payload.thoiHanHopDongText || ''}</div>
              <div class="line indent">- Khi hợp đồng hết hạn, hợp đồng sẽ tự động gia hạn với thời hạn và điều kiện tương tự, trừ trường hợp một trong hai bên có thông báo chấm dứt bằng văn bản trước thời điểm hết hạn.</div>
            </div>
            <div class="section">
              <div class="line"><strong>Điều 3: Quyền và nghĩa vụ của người lao động</strong></div>
              <div class="line subtitle">3.1. Quyền lợi của người lao động</div>
              <div class="line">a) Tiền lương và phụ cấp:</div>
              <div class="line indent">- Mức lương chính: ${payload.mucLuongText || '................................'}VNĐ/tháng.</div>
              <div class="line indent">- Mức lương chính được điều chỉnh theo quy định của Nhà nước về mức lương tối thiểu vùng và theo thang bảng lương do Công ty xây dựng.</div>
              <div class="line indent">- Lương hiệu quả công việc: Theo quy chế lương, thưởng, phụ cấp, trợ cấp Công ty ban hành từng thời điểm và thông báo cho người lao động.</div>
              <div class="line indent">- Hình thức trả lương: 02 lần/tháng bằng tiền mặt hoặc chuyển khoản.</div>
              <div class="line indent">- Người lao động được tạm ứng lương theo quy định.</div>
              <div class="line">b) Các quyền lợi khác:</div>
              <div class="line indent">- Khen thưởng: Người lao động được khuyến khích bằng vật chất hoặc tinh thần khi có thành tích trong công tác hoặc theo quy định của công ty.</div>
              <div class="line indent">- Chế độ nâng lương: Theo quy định của Nhà nước và Quy chế, nội quy của Công ty.</div>
              <div class="line indent">- Chế độ nghỉ: Theo quy định chung của Nhà nước.</div>
              <div class="line indent">+ Nghỉ hàng tuần: được bố trí linh hoạt 01 ngày nghỉ/tuần theo kế hoạch sản xuất, kinh doanh của Công ty.</div>
              <div class="line indent">- Nghỉ lễ, Tết: Thực hiện theo quy định của pháp luật. Trường hợp làm việc vào ngày lễ, Tết thì được bố trí nghỉ bù và/hoặc thanh toán tiền lương theo quy định của pháp luật.</div>
              <div class="line indent">- Chế độ Bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp: Theo quy định của Nhà nước.</div>
              <div class="line indent">- Dụng cụ, công cụ làm việc và đồng phục: Công ty cấp phát, lắp đặt và trang bị cùng phương tiện được bàn giao.</div>
              <div class="line indent">- Chế độ đào tạo, bồi dưỡng, nâng cao trình độ, kỹ năng nghề nghiệp cho người lao động: được xem xét hỗ trợ kinh phí đào tạo, bồi dưỡng tùy theo yêu cầu công việc, năng lực, trình độ của người lao động và nhu cầu sử dụng lao động của Công ty.</div>
              <div class="line subtitle">3.2. Nghĩa vụ của người lao động</div>
              <div class="line indent">- Thực hiện đúng công việc theo Hợp đồng lao động, chấp hành sự điều hành, phân công công việc của Công ty.</div>
              <div class="line indent">- Chấp hành Nội quy lao động, quy chế quản lý lái xe, quy chế tài chính và các quy định nội bộ khác của Công ty.</div>
              <div class="line indent">- Tuân thủ quy định của pháp luật về giao thông đường bộ, đảm bảo an toàn cho hành khách và phương tiện trong quá trình vận hành.</div>
              <div class="line indent">- Sử dụng phương tiện được giao đúng mục đích; quản lý, bảo quản tài sản, trang thiết bị, giấy tờ xe và các tài sản khác của Công ty.</div>
              <div class="line indent">- Hoàn toàn chịu trách nhiệm trước pháp luật nếu vi phạm luật giao thông, vận chuyển hàng cấm và các hành vi không được Pháp luật cho phép khác.</div>
              <div class="line indent">- Không được tự ý giao xe, cho mượn, cho thuê hoặc để người khác điều khiển phương tiện khi chưa được Công ty chấp thuận.</div>
              <div class="line indent">- Thực hiện đầy đủ các nghĩa vụ tài chính phát sinh trong quá trình làm việc theo quy định của Công ty và các thỏa thuận đã ký kết.</div>
              <div class="line indent">- Báo cáo kịp thời cho Công ty khi xảy ra tai nạn, sự cố, vi phạm giao thông hoặc các vấn đề phát sinh liên quan đến phương tiện và hoạt động vận tải.</div>
              <div class="line indent">- Hợp tác với Công ty trong việc xử lý các vi phạm, khiếu nại của khách hàng và các vấn đề phát sinh trong quá trình cung cấp dịch vụ.</div>
              <div class="line indent">- Bồi thường thiệt hại theo quy định của pháp luật và quy chế của Công ty trong trường hợp gây mất mát, hư hỏng tài sản hoặc gây thiệt hại do lỗi của mình.</div>
              <div class="line indent">- Bảo mật thông tin kinh doanh, dữ liệu khách hàng, thông tin điều hành và các thông tin nội bộ khác của Công ty.</div>
              <div class="line indent">- Thực hiện các công việc khác có liên quan theo sự phân công hợp lý của Công ty.</div>
            </div>
            <div class="section">
              <div class="line"><strong>Điều 4: Quyền và nghĩa vụ của người sử dụng lao động</strong></div>
              <div class="line subtitle">4.1. Quyền hạn của người sử dụng lao động</div>
              <div class="line indent">- Tổ chức, điều hành sản xuất kinh doanh; phân công, điều động, bố trí ca làm việc, khu vực hoạt động của người lao động phù hợp với nhu cầu kinh doanh.</div>
              <div class="line indent">- Tạm thời điều chuyển người lao động làm công việc khác theo quy định của pháp luật khi cần thiết.</div>
              <div class="line indent">- Ban hành nội quy, quy chế và yêu cầu người lao động chấp hành.</div>
              <div class="line indent">- Kiểm tra, giám sát việc thực hiện công việc, việc sử dụng phương tiện, tài sản được giao.</div>
              <div class="line indent">- Áp dụng các hình thức kỷ luật lao động theo quy định của pháp luật.</div>
              <div class="line indent">- Yêu cầu người lao động bồi thường thiệt hại khi gây mất mát, hư hỏng tài sản hoặc phát sinh thiệt hại do lỗi của người lao động theo quy định của pháp luật và quy chế của Công ty.</div>
              <div class="line indent">- Đơn phương chấm dứt hợp đồng lao động, tạm hoãn hợp đồng lao động theo quy định của pháp luật.</div>
              <div class="line subtitle">4.2. Nghĩa vụ của người sử dụng lao động</div>
              <div class="line indent">- Bảo đảm việc làm và thực hiện đầy đủ các điều khoản đã cam kết trong Hợp đồng lao động.</div>
              <div class="line indent">- Thanh toán đầy đủ, đúng thời hạn tiền lương và các chế độ khác cho người lao động theo thỏa thuận trong Hợp đồng lao động và quy định của pháp luật.</div>
              <div class="line indent">- Xây dựng, ban hành và công khai Nội quy lao động, quy chế quản lý lái xe, quy chế tài chính và các quy định nội bộ khác.</div>
              <div class="line indent">- Tôn trọng danh dự, nhân phẩm của người lao động; không được áp dụng hình thức xử lý trái pháp luật.</div>
            </div>
            <div class="section">
              <div class="line"><strong>Điều 5: Những thỏa thuận khác</strong></div>
              <div class="line indent">- Trong quá trình thực hiện hợp đồng nếu một bên có nhu cầu thay đổi nội dung trong Hợp đồng phải báo cho bên kia trước ít nhất 03 ngày và ký kết bản Phụ lục Hợp đồng theo quy định của pháp luật. Trong thời gian tiến hành thỏa thuận hai bên vẫn tuân theo Hợp đồng lao động đã ký kết.</div>
              <div class="line indent">- Người lao động đọc kỹ, hiểu rõ và cam kết thực hiệm các điều khoản và quy định ghi tại Hợp đồng lao động.</div>
            </div>
            <div class="section">
              <div class="line"><strong>Điều 6: Điều khoản thi hành</strong></div>
              <div class="line indent">- Những vấn đề về lao động không ghi trong Hợp đồng này thì áp dụng theo quy định của thỏa ước tập thể, nội quy lao động và pháp luật lao động.</div>
              <div class="line indent">- Hợp đồng này được lập thành 02 (hai) bản có giá trị pháp lý như nhau, mỗi bên giữ 01 bản. Khi hai bên ký kết phụ lục hợp đồng thì nội dung của phụ lục hợp đồng cũng có giá trị như các nội dung của bản hợp đồng này.</div>
            </div>
            <table class="sign-table">
              <tr><td><div class="sign-title">Người sử dụng lao động</div><div class="sign-note">(Ký và đóng dấu)</div></td><td><div class="sign-title">Người lao động</div><div class="sign-note">(Ký và ghi rõ họ tên)</div></td></tr>
              <tr><td><div class="sign-space"></div></td><td><div class="sign-space"></div></td></tr>
              <tr><td class="bold"></td><td class="bold"></td></tr>
            </table>          </div>
        `;
      }

      async function exportWord() {
        if (!currentPayload) return;
        exportButton.disabled = true;
        try {
          const response = await fetch('/hdld_nhan_vien_lai_xe_template.docx?v=preview-match-word-20260622');
          if (!response.ok) throw new Error('Không thể tải template Word.');
          const content = await response.arrayBuffer();
          const sourceZip = new PizZip(content);
          const zip = normalizeDocxZipEntryNames(sourceZip);
          const Docxtemplater = window.docxtemplater?.Docxtemplater || window.docxtemplater;
          const doc = new Docxtemplater(zip, {
            paragraphLoop: true,
            linebreaks: true,
            nullGetter: () => ''
          });
          doc.render(buildTemplateData(currentPayload));
          const blob = doc.getZip().generate({
            type: 'blob',
            mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
          });
          window.saveAs(blob, buildExportFileName(currentPayload));
        } catch (error) {
          alert(`Xuất Word thất bại: ${error.message}`);
        } finally {
          exportButton.disabled = !currentPayload;
        }
      }

      async function init() {
        try {
          if (!idHopDongLaoDong) throw new Error('Thiếu tham số ID_HopDongLaoDong trên URL.');
          statusText.textContent = 'Đang tải HĐLĐ nhân viên lái xe từ Google Sheets...';
          const bundle = await fetchBundle();
          const row = bundle.row || null;
          if (!row) throw new Error(`Không tìm thấy HĐLĐ nhân viên lái xe với ID_HopDongLaoDong = ${idHopDongLaoDong}.`);
          const payload = buildPayload(row, bundle.related || {});
          render(payload);
          statusText.textContent = `Đã tải hợp đồng ${idHopDongLaoDong}.`;
        } catch (error) {
          statusText.textContent = 'Không tải được HĐLĐ nhân viên lái xe.';
          message.hidden = false;
          message.textContent = error.message || 'Không tải được HĐLĐ nhân viên lái xe.';
        }
      }

      init();
    </script>
