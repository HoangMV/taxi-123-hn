<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trung tâm điều hành QLVT TAXI123</title>
    <style>
      :root {
        --navy: #0b2d5c;
        --blue: #2563eb;
        --green: #16a34a;
        --cyan: #0891b2;
        --amber: #f59e0b;
        --violet: #7c3aed;
        --red: #ef4444;
        --border: #dbe3ef;
        --muted: #64748b;
        --text: #0f172a;
        --bg: #f1f5f9;
        --palette-0: #2563eb;
        --palette-1: #16a34a;
        --palette-2: #f59e0b;
        --palette-3: #7c3aed;
        --palette-4: #ef4444;
        --palette-5: #06b6d4;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; line-height: 1.5; letter-spacing: 0; }
      button, select, input { font: inherit; }
      button { min-height: 36px; border: 0; border-radius: 6px; background: var(--blue); color: #fff; padding: 8px 13px; font-size: 14px; font-weight: 700; line-height: 1.25; cursor: pointer; }
      button:hover { filter: brightness(.96); }
      button:disabled { cursor: not-allowed; opacity: .65; }
      button.secondary { background: #e8eef8; color: #1e3a8a; }
      button.ghost { background: rgba(255,255,255,.12); color: #fff; }
      button.green { background: #10b981; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 28px; background: var(--navy); color: #fff; box-shadow: 0 2px 10px rgba(15, 23, 42, .14); }
      .brand { display: flex; min-width: 0; align-items: center; gap: 12px; }
      .menu-btn, .brand-mark, .user-mark { display: grid; flex: 0 0 auto; place-items: center; height: 40px; width: 40px; border-radius: 7px; background: rgba(255,255,255,.12); color: #fff; }
      .brand-mark { border-radius: 50%; background: #fff; color: #1e3a8a; font-weight: 800; }
      .user-mark { border-radius: 50%; font-weight: 800; }
      h1 { margin: 0; overflow: hidden; color: #fff; font-size: 20px; font-weight: 700; line-height: 1.25; text-overflow: ellipsis; white-space: nowrap; }
      .updated { margin-top: 3px; color: #dbeafe; font-size: 14px; font-weight: 500; }
      .toolbar { display: flex; flex-wrap: wrap; align-items: center; justify-content: flex-end; gap: 8px; }
      main { padding: 0 28px 34px; }
      .panel { border: 1px solid var(--border); border-radius: 8px; background: #fff; box-shadow: 0 8px 18px rgba(15, 23, 42, .05); }
      .filter-band { margin-top: -1px; padding: 16px; border-top: 0; border-radius: 0 0 8px 8px; }
      .filter-grid { display: grid; grid-template-columns: repeat(8, minmax(130px, 1fr)); gap: 12px; }
      .filter-extra { display: grid; grid-template-columns: repeat(3, minmax(160px, 1fr)) auto; align-items: end; gap: 12px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #eef2f7; }
      label { display: grid; min-width: 0; gap: 5px; color: #64748b; font-size: 11px; font-weight: 700; letter-spacing: .025em; text-transform: uppercase; }
      select, input { width: 100%; height: 36px; border: 1px solid var(--border); border-radius: 6px; background: #fff; color: var(--text); padding: 0 10px; font-size: 14px; font-weight: 500; outline: none; }
      select:focus, input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37, 99, 235, .12); }
      .message { margin-top: 16px; border-radius: 8px; padding: 12px 14px; font-size: 14px; font-weight: 700; }
      .error { border: 1px solid #fecaca; background: #fef2f2; color: #991b1b; }
      .warn { border: 1px solid #fde68a; background: #fffbeb; color: #92400e; }
      .kpis { display: grid; grid-template-columns: repeat(6, minmax(150px, 1fr)); gap: 16px; margin-top: 20px; }
      .kpi { padding: 16px; }
      .kpi-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
      .kpi-label { overflow: hidden; color: var(--muted); font-size: 14px; font-weight: 600; text-overflow: ellipsis; white-space: nowrap; }
      .kpi-value { margin-top: 9px; color: #020617; font-size: 30px; font-weight: 700; line-height: 1; }
      .kpi-hint { margin-top: 8px; color: var(--muted); font-size: 12px; font-weight: 600; }
      .kpi-icon { display: grid; flex: 0 0 auto; place-items: center; height: 44px; width: 44px; border-radius: 50%; font-size: 13px; font-weight: 700; }
      .tone-blue { background: #eff6ff; color: var(--blue); }
      .tone-green { background: #ecfdf5; color: var(--green); }
      .tone-amber { background: #fffbeb; color: #d97706; }
      .tone-violet { background: #f5f3ff; color: var(--violet); }
      .tone-cyan { background: #ecfeff; color: var(--cyan); }
      .tone-red { background: #fef2f2; color: var(--red); }
      .spark { display: flex; height: 36px; align-items: end; gap: 6px; margin-top: 16px; overflow: hidden; }
      .spark span { flex: 1; border-radius: 4px 4px 0 0; background: #dbe3ef; }
      .dash-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; margin-top: 20px; }
      .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 16px 20px; border-bottom: 1px solid #eef2f7; }
      .panel-head h2 { margin: 0; color: #020617; font-size: 16px; }
      .total-pill { border-radius: 999px; background: #eff6ff; color: #1d4ed8; padding: 5px 11px; font-size: 12px; font-weight: 700; white-space: nowrap; }
      .donut-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; padding: 16px; }
      .donut-card { min-width: 0; border: 1px solid #eef2f7; border-radius: 6px; background: #f8fafc; padding: 16px; }
      .donut-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; color: #334155; font-size: 14px; font-weight: 700; }
      .donut-body { display: flex; align-items: center; gap: 16px; }
      .donut { position: relative; flex: 0 0 auto; width: 142px; height: 142px; border-radius: 50%; background: #e2e8f0; }
      .donut::after { position: absolute; inset: 22px; display: grid; place-items: center; border-radius: 50%; background: #fff; box-shadow: inset 0 2px 8px rgba(15,23,42,.08); color: #020617; content: attr(data-total); font-size: 22px; font-weight: 700; }
      .legend { min-width: 0; flex: 1; display: grid; gap: 8px; }
      .legend-row { display: grid; grid-template-columns: 10px minmax(0, 1fr) auto; align-items: center; gap: 8px; color: #475569; font-size: 12px; }
      .dot { width: 10px; height: 10px; border-radius: 50%; }
      .legend-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .bar-panel .panel-body { display: grid; gap: 12px; padding: 20px; }
      .bar-row { display: grid; grid-template-columns: minmax(90px, 160px) 1fr 82px; align-items: center; gap: 12px; font-size: 14px; }
      .bar-label { overflow: hidden; color: #475569; font-weight: 600; text-overflow: ellipsis; white-space: nowrap; }
      .bar-track { height: 12px; overflow: hidden; border-radius: 999px; background: #e2e8f0; }
      .bar-fill { height: 100%; min-width: 0; border-radius: 999px; }
      .bar-value { text-align: right; color: #0f172a; font-size: 12px; font-weight: 700; white-space: nowrap; }
      .report-panel { margin-top: 20px; }
      .tabs { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; background: #f8fafc; padding: 4px; }
      .tab { background: transparent; color: #64748b; padding: 7px 12px; }
      .tab.active { background: #fff; color: #1d4ed8; box-shadow: 0 1px 4px rgba(15, 23, 42, .08); }
      .table-info { color: var(--muted); font-size: 14px; font-weight: 700; }
      .table-wrap { overflow: auto; max-height: 520px; padding: 16px; }
      table { width: 100%; min-width: 1100px; border-collapse: collapse; font-size: 13px; }
      th, td { border-bottom: 1px solid #edf2f7; padding: 10px; text-align: left; vertical-align: top; }
      th { position: sticky; top: 0; z-index: 1; background: #f8fafc; color: #475569; font-size: 12px; font-weight: 700; text-transform: uppercase; }
      .badge { display: inline-block; border: 1px solid var(--border); border-radius: 999px; padding: 3px 8px; font-size: 12px; font-weight: 700; }
      .do { border-color: #fecaca; background: #fef2f2; color: #dc2626; }
      .vang { border-color: #fde68a; background: #fffbeb; color: #d97706; }
      .xanh { border-color: #bbf7d0; background: #f0fdf4; color: #16a34a; }
      .xam { background: #f1f5f9; color: #475569; }
      @media (max-width: 1360px) { .filter-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } .kpis { grid-template-columns: repeat(3, minmax(0, 1fr)); } .donut-grid { grid-template-columns: 1fr; } }
      @media (max-width: 980px) { .topbar { align-items: flex-start; flex-direction: column; } .toolbar { justify-content: flex-start; } .filter-grid, .filter-extra, .dash-grid { grid-template-columns: 1fr; } .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      @media (max-width: 640px) { main, .topbar { padding-left: 14px; padding-right: 14px; } h1 { font-size: 17px; } .toolbar button { flex: 1; } .kpis { grid-template-columns: 1fr; } .donut-body, .bar-row { grid-template-columns: 1fr; } .donut-body { flex-direction: column; } .bar-value { text-align: left; } }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <button type="button" class="menu-btn" id="menuButton" aria-label="Mở menu chức năng">☰</button>
        <div class="brand-mark">QL</div>
        <div style="min-width:0;">
          <h1>Trung tâm điều hành QLVT TAXI123</h1>
          <div class="updated" id="updatedAt">Đang tải dữ liệu...</div>
        </div>
      </div>
      <div class="toolbar">
        <button type="button" class="ghost" id="refreshButton">Cập nhật</button>
        <button type="button" id="exportNhanSuButton">Xuất nhân sự</button>
        <button type="button" class="green" id="exportXeButton">Xuất phương tiện</button>
        <div class="user-mark">U</div>
      </div>
    </header>
    <main>
      <section class="panel filter-band">
        <div class="filter-grid" id="filtersMain"></div>
        <div class="filter-extra" id="filtersExtra"></div>
      </section>
      <div id="message"></div>
      <section class="kpis" id="kpis"></section>
      <section class="dash-grid" id="structurePanels"></section>
      <section class="dash-grid" id="topPanels"></section>
      <section class="panel report-panel">
        <div class="panel-head">
          <div>
            <h2>Tra cứu và báo cáo tổng hợp</h2>
            <div class="table-info" id="tableCount"></div>
          </div>
          <div class="tabs">
            <button type="button" class="tab active" data-tab="nhan-su">Nhân sự</button>
            <button type="button" class="tab" data-tab="xe">Phương tiện</button>
          </div>
        </div>
        <div class="table-wrap"><table id="reportTable"></table></div>
      </section>
    </main>

    <script>
      const EXCELJS_URL = 'https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js';
      const FILE_SAVER_URL = 'https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js';
      const palette = ['#2563eb', '#16a34a', '#f59e0b', '#7c3aed', '#ef4444', '#06b6d4'];
      const state = { data: null, filters: {}, tab: 'nhan-su', loadingLibs: false };
      const mainFilterDefs = [
        ['donVi', 'Đơn vị'], ['doiXe', 'Đội xe'], ['loaiXe', 'Loại xe'], ['trangThaiXe', 'Trạng thái xe'],
        ['trangThaiNhanSu', 'Trạng thái nhân sự'], ['nhomCanhBao', 'Cảnh báo']
      ];
      const extraFilterDefs = [
        ['loaiHopDong', 'Loại hợp đồng'], ['trangThaiHopDong', 'Trạng thái hợp đồng'], ['trangThaiBhxh', 'Trạng thái BHXH']
      ];
      const nhanSuColumns = [
        ['stt', 'STT'], ['idNhanSu', 'ID nhân sự'], ['hoTen', 'Họ tên'], ['cccd', 'CCCD'], ['ngaySinh', 'Ngày sinh'],
        ['soDienThoai', 'Số điện thoại'], ['doiXe', 'Đội xe'], ['boPhan', 'Bộ phận'], ['chucDanh', 'Chức danh'],
        ['trangThaiLamViec', 'Trạng thái làm việc'], ['xeDangLai', 'Xe đang lái'], ['bienSoXe', 'Biển số xe'],
        ['loaiHopDong', 'Loại hợp đồng'], ['soHopDong', 'Số hợp đồng'], ['ngayKyHopDong', 'Ngày ký hợp đồng'],
        ['ngayBatDau', 'Ngày bắt đầu'], ['ngayKetThuc', 'Ngày kết thúc'], ['trangThaiHopDong', 'Trạng thái hợp đồng'],
        ['soGplx', 'Số GPLX'], ['hangGplx', 'Hạng GPLX'], ['hanGplx', 'Hạn GPLX'], ['hanSucKhoe', 'Hạn sức khỏe'],
        ['soSoBhxh', 'Số sổ BHXH'], ['maSoBhxh', 'Mã số BHXH'], ['trangThaiBhxh', 'Trạng thái BHXH'],
        ['mucLuongDongBhxh', 'Mức lương đóng BHXH'], ['canhBao', 'Ghi chú cảnh báo']
      ];
      const xeColumns = [
        ['stt', 'STT'], ['idXe', 'ID xe'], ['bienSo', 'Biển số'], ['maDam', 'Mã đàm'], ['tenDangKyXe', 'Tên đăng ký xe'],
        ['soKhung', 'Số khung'], ['soMay', 'Số máy'], ['nhanHieu', 'Nhãn hiệu'], ['loaiXe', 'Loại xe'], ['soCho', 'Số chỗ'],
        ['namSanXuat', 'Năm sản xuất'], ['mauSon', 'Màu sơn'], ['donViChuQuan', 'Đơn vị chủ quản'],
        ['donViQuanLyHienTai', 'Đơn vị quản lý hiện tại'], ['doiXe', 'Đội xe'], ['trangThaiXe', 'Trạng thái xe'],
        ['laiXeDangLai', 'Lái xe đang lái'], ['soPhuHieu', 'Số phù hiệu'], ['hanPhuHieu', 'Hạn phù hiệu'],
        ['hanDangKiem', 'Hạn đăng kiểm'], ['hanBaoHiemTnds', 'Hạn bảo hiểm TNDS'], ['hanBaoHiemThanVo', 'Hạn bảo hiểm thân vỏ'],
        ['hanTaximet', 'Hạn taximet'], ['coTheChapKhong', 'Có thế chấp không'], ['nganHangTheChap', 'Ngân hàng thế chấp'],
        ['hanTheChap', 'Hạn thế chấp'], ['trangThaiKhoanVay', 'Trạng thái khoản vay'], ['kmLuyKe', 'Km lũy kế'],
        ['soChuyenThang', 'Số chuyến tháng'], ['canhBao', 'Ghi chú cảnh báo']
      ];

      function clean(value) { return value == null ? '' : String(value).trim(); }
      function escapeHtml(value) { return clean(value).replace(/[&<>"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char])); }
      function normalize(value) { return clean(value).normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D').toLowerCase(); }
      function match(value, selected) { return !clean(selected) || normalize(value) === normalize(selected); }
      function number(value) { return Number(value || 0).toLocaleString('vi-VN'); }
      function percent(value, total) { return total ? `${Math.round(Number(value || 0) / total * 100)}%` : '0%'; }
      function numeric(value) { return Number(String(value || '').replace(/[^0-9.-]/g, '') || 0); }
      function options(key) { return (state.data?.filters?.[key] || []).filter(Boolean); }
      function showMessage(text, type) { document.getElementById('message').innerHTML = text ? `<div class="message ${type || 'warn'}">${escapeHtml(text)}</div>` : ''; }
      function script(src) { return new Promise((resolve, reject) => { const s = document.createElement('script'); s.src = src; s.onload = resolve; s.onerror = reject; document.head.appendChild(s); }); }
      async function ensureExcelLibs() { if (window.ExcelJS && window.saveAs) return; if (state.loadingLibs) return; state.loadingLibs = true; await script(EXCELJS_URL); await script(FILE_SAVER_URL); state.loadingLibs = false; }
      function warningText(level) { return ({ do: 'Đỏ', vang: 'Vàng', xanh: 'Xanh', xam: 'Xám' })[level] || 'Xám'; }
      function filterOptionText(key, value) { return key === 'nhomCanhBao' ? warningText(value) : value; }

      async function loadData() {
        showMessage('', '');
        document.getElementById('updatedAt').textContent = 'Đang tải dữ liệu...';
        try {
          const response = await fetch('/api/dashboard-qlvt', { headers: { Accept: 'application/json' } });
          const text = await response.text();
          const data = text ? JSON.parse(text) : {};
          if (!response.ok) throw new Error(data.error || 'Không tải được dashboard QLVT.');
          state.data = data;
          if (data.missingSources?.length) showMessage(`Một số bảng chưa đọc được: ${data.missingSources.map((item) => item.table).join(', ')}.`, 'warn');
          document.getElementById('updatedAt').textContent = `Cập nhật: ${new Date(data.generatedAt || Date.now()).toLocaleString('vi-VN')}`;
          renderAll();
        } catch (error) {
          showMessage(`${error.message}. Khi chạy local, hãy chạy npm run proxy.`, 'error');
        }
      }

      function selectHtml(key, label) {
        return `<label><span>${label}</span><select data-filter="${key}"><option value="">Tất cả</option>${options(key).map((item) => `<option value="${escapeHtml(item)}" ${state.filters[key] === item ? 'selected' : ''}>${escapeHtml(filterOptionText(key, item))}</option>`).join('')}</select></label>`;
      }

      function renderFilters() {
        document.getElementById('filtersMain').innerHTML = mainFilterDefs.map(([key, label]) => selectHtml(key, label)).join('') +
          `<label><span>Từ tháng</span><input type="month" data-filter="tuThang" value="${escapeHtml(state.filters.tuThang || '')}"></label>` +
          `<label><span>Đến tháng</span><input type="month" data-filter="denThang" value="${escapeHtml(state.filters.denThang || '')}"></label>`;
        document.getElementById('filtersExtra').innerHTML = extraFilterDefs.map(([key, label]) => selectHtml(key, label)).join('') +
          `<div style="display:flex;gap:8px;"><button type="button" id="applyFilters">Áp dụng</button><button type="button" class="secondary" id="clearFilters">Xóa lọc</button></div>`;
        document.querySelectorAll('[data-filter]').forEach((input) => input.addEventListener('change', (event) => { state.filters[event.target.dataset.filter] = event.target.value; renderAll(); }));
        document.getElementById('applyFilters').addEventListener('click', () => showMessage('Đã áp dụng bộ lọc dashboard.', 'warn'));
        document.getElementById('clearFilters').addEventListener('click', () => { state.filters = {}; renderAll(); });
      }

      function parseMonthValue(value) {
        const text = clean(value);
        const matchValue = text.match(/^(\d{4})-(\d{2})$/);
        return matchValue ? Number(matchValue[1]) * 12 + Number(matchValue[2]) : null;
      }
      function rowMonths(row, keys) {
        return keys.map((key) => clean(row[key])).filter(Boolean).map((value) => {
          const matchDate = value.match(/(\d{1,2})[/-](\d{1,2})[/-](\d{4})/);
          if (matchDate) return Number(matchDate[3]) * 12 + Number(matchDate[2]);
          const nativeDate = new Date(value);
          return Number.isNaN(nativeDate.getTime()) ? null : nativeDate.getFullYear() * 12 + nativeDate.getMonth() + 1;
        }).filter(Boolean);
      }
      function matchMonthRange(row, keys) {
        const from = parseMonthValue(state.filters.tuThang);
        const to = parseMonthValue(state.filters.denThang);
        if (!from && !to) return true;
        const months = rowMonths(row, keys);
        if (!months.length) return true;
        return months.some((month) => (!from || month >= from) && (!to || month <= to));
      }

      function filterNhanSu() {
        return (state.data?.reports?.nhanSu || []).filter((row) => match(row.donVi, state.filters.donVi) && match(row.doiXe, state.filters.doiXe) && match(row.trangThaiLamViec, state.filters.trangThaiNhanSu) && match(row.loaiHopDong, state.filters.loaiHopDong) && match(row.trangThaiHopDong, state.filters.trangThaiHopDong) && match(row.trangThaiBhxh, state.filters.trangThaiBhxh) && match(row.warningLevel, state.filters.nhomCanhBao) && matchMonthRange(row, ['ngayKyHopDong', 'ngayBatDau', 'ngayKetThuc', 'hanGplx', 'hanSucKhoe'])).map((row, index) => ({ ...row, stt: index + 1 }));
      }
      function filterXe() {
        return (state.data?.reports?.xe || []).filter((row) => match(row.donViQuanLyHienTai, state.filters.donVi) && match(row.doiXe, state.filters.doiXe) && match(row.loaiXe, state.filters.loaiXe) && match(row.trangThaiXe, state.filters.trangThaiXe) && match(row.warningLevel, state.filters.nhomCanhBao) && matchMonthRange(row, ['hanPhuHieu', 'hanDangKiem', 'hanBaoHiemTnds', 'hanBaoHiemThanVo', 'hanTaximet', 'hanTheChap'])).map((row, index) => ({ ...row, stt: index + 1 }));
      }
      function countBy(rows, key) { const map = new Map(); rows.forEach((row) => { const label = clean(row[key]) || 'Chưa có dữ liệu'; map.set(label, (map.get(label) || 0) + 1); }); return [...map].map(([label, value]) => ({ label, value })).sort((a, b) => b.value - a.value).slice(0, 6); }
      function donutBg(items) { const total = items.reduce((sum, item) => sum + Number(item.value || 0), 0); if (!total) return '#e2e8f0'; let current = 0; return `conic-gradient(${items.map((item, index) => { const start = current; current += Number(item.value || 0) / total * 360; return `${palette[index % palette.length]} ${start}deg ${current}deg`; }).join(', ')})`; }
      function renderDonut(title, rows, key) {
        const items = countBy(rows, key);
        const safeItems = items.length ? items : [{ label: 'Chưa có dữ liệu', value: 0 }];
        const total = safeItems.reduce((sum, item) => sum + Number(item.value || 0), 0);
        return `<div class="donut-card"><div class="donut-title"><span>${title}</span><strong>${number(total)}</strong></div><div class="donut-body"><div class="donut" data-total="${number(total)}" style="background:${donutBg(safeItems)}"></div><div class="legend">${safeItems.map((item, index) => `<div class="legend-row"><span class="dot" style="background:${palette[index % palette.length]}"></span><span class="legend-label">${escapeHtml(item.label)}</span><strong>${number(item.value)}</strong></div>`).join('')}</div></div></div>`;
      }
      function renderPanel(title, totalLabel, body) { return `<section class="panel"><div class="panel-head"><h2>${title}</h2><span class="total-pill">${totalLabel}</span></div><div class="donut-grid">${body}</div></section>`; }
      function topRows(rows, key) { return [...rows].map((row) => ({ label: row.bienSo || row.idXe || 'Chưa có dữ liệu', value: numeric(row[key]) })).sort((a, b) => b.value - a.value).slice(0, 10); }
      function renderTopPanel(title, rows, unit) {
        const safeRows = rows.length ? rows : [{ label: 'Chưa có dữ liệu', value: 0 }];
        const max = safeRows.reduce((value, item) => Math.max(value, Number(item.value || 0)), 0);
        return `<section class="panel bar-panel"><div class="panel-head"><h2>${title}</h2></div><div class="panel-body">${safeRows.map((item, index) => `<div class="bar-row"><span class="bar-label">${escapeHtml(item.label)}</span><div class="bar-track"><div class="bar-fill" style="width:${max ? Math.max(5, Math.round(item.value / max * 100)) : 0}%;background:${palette[index % palette.length]}"></div></div><span class="bar-value">${number(item.value)} ${unit}</span></div>`).join('')}</div></section>`;
      }

      function renderKpis(nhanSu, xe) {
        const nsActive = nhanSu.filter((item) => clean(item.trangThaiLamViec) && !normalize(item.trangThaiLamViec).includes('nghi')).length;
        const xeActive = xe.filter((item) => clean(item.trangThaiXe) && !normalize(item.trangThaiXe).includes('ngung')).length;
        const cards = [
          ['Tổng nhân sự', nhanSu.length, 'Theo bộ lọc', 'NS', 'tone-blue', [45,70,50,82,62,78]],
          ['Đang làm việc', nsActive, percent(nsActive, nhanSu.length), 'LV', 'tone-green', [35,52,68,58,76,84]],
          ['Nghỉ việc', nhanSu.length - nsActive, percent(nhanSu.length - nsActive, nhanSu.length), 'NV', 'tone-amber', [25,42,36,55,32,44]],
          ['Tổng số xe', xe.length, 'Theo bộ lọc', 'XE', 'tone-violet', [52,48,63,72,66,80]],
          ['Xe hoạt động', xeActive, percent(xeActive, xe.length), 'HD', 'tone-cyan', [38,58,74,61,83,90]],
          ['Xe ngừng', xe.length - xeActive, percent(xe.length - xeActive, xe.length), 'NG', 'tone-red', [18,30,24,36,28,42]]
        ];
        document.getElementById('kpis').innerHTML = cards.map(([label, value, hint, icon, tone, bars]) => `<div class="panel kpi"><div class="kpi-top"><div><div class="kpi-label">${label}</div><div class="kpi-value">${number(value)}</div><div class="kpi-hint">${hint}</div></div><div class="kpi-icon ${tone}">${icon}</div></div><div class="spark">${bars.map((height) => `<span style="height:${height}%"></span>`).join('')}</div></div>`).join('');
      }

      function renderTable(rows, columns) {
        const shownColumns = columns.slice(0, 10);
        const head = `<thead><tr><th>Mức</th>${shownColumns.map(([, label]) => `<th>${label}</th>`).join('')}</tr></thead>`;
        const body = rows.slice(0, 40).map((row) => `<tr><td><span class="badge ${row.warningLevel || 'xam'}">${warningText(row.warningLevel)}</span></td>${shownColumns.map(([key]) => `<td>${escapeHtml(row[key])}</td>`).join('')}</tr>`).join('') || `<tr><td colspan="11" style="text-align:center;color:var(--muted);padding:28px;">Không có dữ liệu phù hợp bộ lọc.</td></tr>`;
        document.getElementById('reportTable').innerHTML = head + `<tbody>${body}</tbody>`;
      }

      function renderAll() {
        const nhanSu = filterNhanSu();
        const xe = filterXe();
        renderFilters();
        renderKpis(nhanSu, xe);
        document.getElementById('structurePanels').innerHTML =
          renderPanel('Cơ cấu nhân sự', `${number(nhanSu.length)} nhân sự`, renderDonut('Nhân sự theo trạng thái', nhanSu, 'trangThaiLamViec') + renderDonut('Nhân sự theo chức danh', nhanSu, 'chucDanh')) +
          renderPanel('Cơ cấu đội xe', `${number(xe.length)} xe`, renderDonut('Xe theo trạng thái', xe, 'trangThaiXe') + renderDonut('Xe theo loại', xe, 'loaiXe'));
        document.getElementById('topPanels').innerHTML = renderTopPanel('Top 10 xe chạy nhiều km nhất', topRows(xe, 'kmLuyKe'), 'km') + renderTopPanel('Top 10 xe có nhiều chuyến nhất', topRows(xe, 'soChuyenThang'), 'chuyến');
        const rows = state.tab === 'xe' ? xe : nhanSu;
        document.getElementById('tableCount').textContent = `Đang hiển thị ${number(rows.length)} dòng. Excel xuất toàn bộ dữ liệu đang lọc.`;
        renderTable(rows, state.tab === 'xe' ? xeColumns : nhanSuColumns);
      }

      async function exportExcel(type) {
        const rows = type === 'xe' ? filterXe() : filterNhanSu();
        if (!rows.length) return showMessage('Không có dữ liệu để xuất Excel.', 'warn');
        await ensureExcelLibs();
        const workbook = new ExcelJS.Workbook();
        const columns = type === 'xe' ? xeColumns : nhanSuColumns;
        const sheet = workbook.addWorksheet(type === 'xe' ? 'Báo cáo phương tiện' : 'Báo cáo nhân sự');
        sheet.columns = columns.map(([key, header]) => ({ key, header, width: Math.min(Math.max(header.length + 8, 14), 34) }));
        rows.forEach((row, index) => sheet.addRow({ ...row, stt: index + 1 }));
        sheet.views = [{ state: 'frozen', ySplit: 1 }];
        sheet.autoFilter = { from: { row: 1, column: 1 }, to: { row: 1, column: columns.length } };
        sheet.getRow(1).font = { bold: true, color: { argb: 'FFFFFFFF' } };
        sheet.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF2563EB' } };
        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        saveAs(blob, `${type === 'xe' ? 'Bao_cao_phuong_tien' : 'Bao_cao_nhan_su'}_QLVT_${new Date().toISOString().slice(0, 10)}.xlsx`);
      }

      document.getElementById('menuButton').addEventListener('click', () => { window.location.href = '/menu'; });
      document.getElementById('refreshButton').addEventListener('click', loadData);
      document.getElementById('exportNhanSuButton').addEventListener('click', () => exportExcel('nhan-su'));
      document.getElementById('exportXeButton').addEventListener('click', () => exportExcel('xe'));
      document.querySelectorAll('.tab').forEach((button) => button.addEventListener('click', () => { state.tab = button.dataset.tab; document.querySelectorAll('.tab').forEach((item) => item.classList.toggle('active', item === button)); renderAll(); }));
      loadData();
    </script>
  </body>
</html>
