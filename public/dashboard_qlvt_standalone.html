<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trung tâm điều hành QLVT TAXI123</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
  <style>
    :root {
      --navy: #0b2d5c;
      --blue: #2563eb;
      --green: #16a34a;
      --cyan: #0891b2;
      --amber: #f59e0b;
      --violet: #7c3aed;
      --red: #ef4444;
      --border: #e2e8f0;
      --muted: #64748b;
      --text: #0f172a;
      --bg: #f1f5f9;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      max-width: 100%;
      overflow-x: hidden
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Be Vietnam Pro", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5
    }

    button,
    select,
    input {
      font: inherit
    }

    .wrap {
      max-width: 1720px;
      margin: 0 auto;
      padding: 0 0 40px;
      overflow-x: hidden
    }

    .content {
      min-width: 0
    }

    /* Header */
    .topbar {
      background: var(--navy);
      color: #fff;
      padding: 16px 24px
    }

    .topbar .row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0
    }

    .brand>div {
      min-width: 0
    }

    .brand img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
      flex: 0 0 auto
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .brand small {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block
    }

    .icon-btn {
      flex: 0 0 auto
    }

    .brand small {
      color: #bcd0ee;
      font-weight: 600
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, .12);
      color: #fff;
      cursor: pointer;
      font-size: 18px
    }

    .nav {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      flex-wrap: wrap
    }

    .nav button {
      background: transparent;
      border: 0;
      color: #c9dcfb;
      padding: 9px 14px;
      border-radius: 9px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px
    }

    .nav button.active {
      background: #fff;
      color: var(--navy)
    }

    /* Layout */
    .content {
      padding: 0 24px
    }

    @media(max-width:640px) {
      .content {
        padding: 0 14px
      }

      .topbar {
        padding: 14px 16px
      }

      .brand h1 {
        font-size: 16px
      }

      .brand img {
        width: 42px;
        height: 42px
      }

      .nav {
        gap: 3px
      }

      .nav button {
        padding: 8px 10px;
        font-size: 13px
      }

      .msg {
        margin: 14px
      }

      .kpi {
        padding: 13px
      }

      .kpi .v {
        font-size: 24px
      }

      .kpi .k,
      .kpi .p {
        font-size: 11px
      }

      .panel-head {
        flex-wrap: wrap
      }

      .panel-body {
        padding: 12px
      }
    }

    .filters {
      margin-top: 18px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .05)
    }

    .fgrid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(6, minmax(0, 1fr))
    }

    @media(max-width:1200px) {
      .fgrid {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr))
      }
    }

    @media(max-width:480px) {
      .fgrid {
        grid-template-columns: 1fr 1fr
      }
    }

    label.f {
      display: block
    }

    label.f span {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px
    }

    label.f select,
    label.f input {
      width: 100%;
      height: 36px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      font-weight: 500
    }

    .frow2 {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 12px;
      margin-top: 12px;
      border-top: 1px solid #eef2f7;
      padding-top: 12px
    }

    .frow2-inner {
      display: grid;
      gap: 12px;
      flex: 1 1 260px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr))
    }

    .frow2 .btn {
      align-self: flex-end
    }

    .btn {
      height: 37px;
      border: 0;
      border-radius: 9px;
      padding: 0 16px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      color: #fff;
      background: var(--blue)
    }

    .btn.amber {
      background: var(--amber);
      color: #1e293b
    }

    .btn.green {
      background: #10b981
    }

    .quick {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
      border-top: 1px solid #eef2f7;
      padding-top: 12px
    }

    .quick .q {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #475569;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer
    }

    .quick .q.on {
      border-color: var(--blue);
      background: #eff6ff;
      color: var(--blue)
    }

    /* KPI */
    .kpis {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      margin-top: 20px
    }

    .kpis-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr))
    }

    @media(max-width:1200px) {
      .kpis {
        grid-template-columns: repeat(3, minmax(0, 1fr))
      }

      .kpis-4 {
        grid-template-columns: repeat(2, minmax(0, 1fr))
      }
    }

    @media(max-width:640px) {

      .kpis,
      .kpis-4 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px
      }
    }

    .kpi {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .05)
    }

    .kpi .k {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted)
    }

    .kpi .v {
      font-size: 30px;
      font-weight: 800;
      margin-top: 6px;
      line-height: 1
    }

    .kpi .p {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-top: 6px
    }

    .kpi .bar {
      height: 8px;
      border-radius: 999px;
      background: #eef2f7;
      overflow: hidden;
      margin-top: 12px
    }

    .kpi .bar>i {
      display: block;
      height: 100%;
      border-radius: 999px
    }

    /* Panels */
    .panel {
      min-width: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .05);
      margin-top: 20px
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid #eef2f7
    }

    .panel-head h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 800
    }

    .total-pill {
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 700
    }

    .panel-body {
      padding: 16px
    }

    .grid {
      display: grid;
      gap: 16px
    }

    .g2 {
      grid-template-columns: repeat(2, minmax(0, 1fr))
    }

    .g3 {
      grid-template-columns: repeat(3, minmax(0, 1fr))
    }

    .g4 {
      grid-template-columns: repeat(4, minmax(0, 1fr))
    }

    @media(max-width:1100px) {

      .g3,
      .g4 {
        grid-template-columns: repeat(2, minmax(0, 1fr))
      }
    }

    @media(max-width:760px) {

      .g2,
      .g3,
      .g4 {
        grid-template-columns: minmax(0, 1fr)
      }
    }

    .card {
      min-width: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 700
    }

    .chart-box {
      position: relative;
      height: 250px
    }

    .donut-wrap {
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 10px;
      padding: 14px
    }

    .donut-wrap .dh {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px
    }

    .donut-wrap .dh h4 {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      color: #1e293b
    }

    .donut-wrap .dh span {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600
    }

    .legend {
      margin-top: 10px
    }

    .legend .li {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #475569;
      padding: 2px 0
    }

    .legend .li i {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto
    }

    .legend .li .nm {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .legend .li .vv {
      font-weight: 700;
      color: #0f172a
    }

    .legend .li .pp {
      width: 38px;
      text-align: right;
      color: #94a3b8;
      font-weight: 600
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      color: #64748b;
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #eef2f7
    }

    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid #f1f5f9;
      color: #334155
    }

    tbody tr:hover {
      background: #f8fafc
    }

    .scroll {
      max-height: 440px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px
    }

    .num {
      text-align: center;
      font-weight: 700
    }

    .badge {
      display: inline-flex;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700
    }

    .b-red {
      background: #fee2e2;
      color: #b91c1c
    }

    .b-amber {
      background: #fef3c7;
      color: #92400e
    }

    .b-green {
      background: #dcfce7;
      color: #15803d
    }

    .days {
      display: inline-flex;
      justify-content: center;
      min-width: 56px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800
    }

    .days.qua {
      background: #fee2e2;
      color: #b91c1c
    }

    .days.sap {
      background: #fef3c7;
      color: #92400e
    }

    /* Alert / gauge */
    .alert-head {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .alert-box {
      border-radius: 14px;
      padding: 16px;
      color: #fff
    }

    .alert-box.r {
      background: linear-gradient(135deg, #fb7185, #dc2626)
    }

    .alert-box.a {
      background: linear-gradient(135deg, #fbbf24, #d97706)
    }

    .alert-box .n {
      font-size: 34px;
      font-weight: 900;
      line-height: 1
    }

    .alert-box .l {
      margin-top: 6px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .05em
    }

    .gauges {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px
    }

    @media(max-width:640px) {
      .gauges {
        grid-template-columns: repeat(3, 1fr)
      }
    }

    .gauge {
      text-align: center
    }

    .gauge .g-box {
      position: relative;
      width: 78px;
      height: 78px;
      margin: 0 auto;
      border-radius: 50%
    }

    .gauge .g-box .in {
      position: absolute;
      inset: 9px;
      background: #fff;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 13px
    }

    .gauge .nm {
      margin-top: 6px;
      font-size: 11px;
      font-weight: 700;
      color: #475569
    }

    .tabs {
      display: inline-flex;
      gap: 4px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 10px;
      padding: 4px;
      margin-top: 20px
    }

    .tabs button {
      background: transparent;
      border: 0;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      color: #64748b;
      cursor: pointer
    }

    .tabs button.on {
      background: var(--blue);
      color: #fff
    }

    .msg {
      margin: 16px 24px;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 13px
    }

    .msg.error {
      background: #fee2e2;
      color: #b91c1c
    }

    .msg.warn {
      background: #fef3c7;
      color: #92400e
    }

    .loading {
      padding: 60px;
      text-align: center;
      color: var(--muted);
      font-weight: 700
    }

    .rp-grid {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 16px;
      margin-top: 20px
    }

    @media(max-width:900px) {
      .rp-grid {
        grid-template-columns: 1fr
      }
    }

    .rp-item {
      width: 100%;
      text-align: left;
      background: transparent;
      border: 0;
      color: #334155;
      padding: 9px 12px;
      border-radius: 9px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer
    }

    .rp-item.on {
      background: var(--blue);
      color: #fff
    }

    .rp-group {
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      margin: 12px 4px 4px
    }

    .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      font-size: 13px;
      color: #475569;
      flex-wrap: wrap
    }

    .pager .pg-btn {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--border);
      background: #fff;
      color: #475569;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer
    }

    .pager .pg-btn:disabled {
      opacity: .5;
      cursor: not-allowed
    }

    a.link {
      color: #1d4ed8;
      text-decoration: none;
      font-weight: 600
    }

    a.link:hover {
      text-decoration: underline
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header class="topbar">
      <div class="row1">
        <div class="brand">
          <img src="/logo-taxi-123.png" alt="TAXI123" onerror="this.style.display='none'" />
          <div>
            <h1>Trung tâm điều hành QLVT TAXI123</h1><small id="updatedAt">Đang tải…</small>
          </div>
        </div>
        <button class="icon-btn" id="refreshButton" title="Cập nhật">↻</button>
      </div>
      <nav class="nav" id="nav">
        <button data-page="tongquan" class="active">📊 Tổng quan</button>
        <button data-page="phuongtien">🚗 Phương tiện</button>
        <button data-page="nhansu">👥 Nhân sự</button>
        <button data-page="tuanthu">⚖️ Tuân thủ pháp lý</button>
        <button data-page="biendong">📈 Biến động</button>
        <button data-page="baocao">📄 Báo cáo</button>
      </nav>
    </header>

    <div id="messages"></div>
    <div class="content" id="page">
      <div class="loading">Đang tải dữ liệu…</div>
    </div>
  </div>

  <script>
    /* =========================================================================
       QLVT Dashboard standalone — 6 màn, port logic từ bản React.
       Dùng chung API /api/dashboard-qlvt (đã trả hoSoSummary, field mới).
       ========================================================================= */
    var PALETTE = ['#2563eb', '#06b6d4', '#16a34a', '#f59e0b', '#ef4444', '#7c3aed', '#ec4899', '#14b8a6', '#64748b', '#0f766e'];
    var NGUONG = 30;
    var state = {
      data: null, page: 'tongquan',
      filters: { tongquan: emptyF(), phuongtien: emptyF(), nhansu: emptyF() },
      ttTab: 'all', report: null, rpFrom: '', rpTo: '',
      tblPage: { phuongtien: 1, nhansu: 1 }, tblSize: { phuongtien: 25, nhansu: 25 }
    };
    var charts = {};

    function emptyF() { return { donVi: '', doiXe: '', loaiXe: '', trangThaiXe: '', trangThaiNhanSu: '', loaiHopDong: '', trangThaiHopDong: '', trangThaiBhxh: '', nhomCanhBao: '', loaiGiayTo: '', tinhTrangHan: '', tuNgay: '', denNgay: '' }; }

    /* ---------- utils ---------- */
    function $(id) { return document.getElementById(id); }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }
    function fmt(n) { return Number(n || 0).toLocaleString('vi-VN'); }
    function clean(v) { return v == null ? '' : String(v).trim(); }
    function norm(v) { return clean(v).normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D').toLowerCase(); }
    function pct(a, b) { b = Number(b) || 0; if (!b) return 0; return Math.round((Number(a) / b) * 1000) / 10; }
    function parseDate(v) {
      if (!v) return null;
      if (v instanceof Date) return isNaN(v) ? null : v;
      var s = String(v).trim(); var m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
      if (m) { var d = new Date(+m[3], +m[2] - 1, +m[1]); return isNaN(d) ? null : d; }
      m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
      if (m) { var d2 = new Date(+m[1], +m[2] - 1, +m[3]); return isNaN(d2) ? null : d2; }
      var d3 = new Date(s); return isNaN(d3) ? null : d3;
    }
    function dayMs(v) { var d = parseDate(v); return d ? new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime() : null; }
    function warnDays(item) {
      if (item && isFinite(item.days)) return item.days;
      var d = parseDate(item && item.date); if (!d) return null;
      var t = new Date(); var a = new Date(t.getFullYear(), t.getMonth(), t.getDate());
      var b = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      return Math.ceil((b - a) / 86400000);
    }

    /* ---------- filtering (port từ filters.js) ---------- */
    function matchText(v, sel) { if (!clean(sel)) return true; return norm(v) === norm(sel); }
    function warnMatchLoai(item, sel) { var t = norm(sel); if (t === norm('Bảo hiểm')) return norm(item && item.name).indexOf('bao hiem') >= 0; return norm(item && item.name) === t; }
    function matchLoaiGiayTo(row, sel) { if (!clean(sel)) return true; return (row.warningItems || []).some(function (it) { return warnMatchLoai(it, sel); }); }
    function matchTinhTrang(row, f) {
      var st = clean(f.tinhTrangHan); if (!st) return true;
      var items = (row.warningItems || []).filter(function (it) { return !clean(f.loaiGiayTo) || warnMatchLoai(it, f.loaiGiayTo); });
      if (st === 'con-hieu-luc') return items.every(function (it) { return norm(it.level) === 'xanh'; });
      return items.some(function (it) {
        var lv = norm(it.level);
        if (st === 'qua-han') return lv === 'do';
        if (st === 'canh-bao') return lv === 'do' || lv === 'vang';
        if (lv !== 'do' && lv !== 'vang') return false;
        var d = warnDays(it); if (d == null) return false;
        if (st === 'sap-15') return d >= 0 && d <= 15;
        if (st === 'sap-30') return d >= 0 && d <= 30;
        return false;
      });
    }

    });
    document.addEventListener('click', function (e) {
      var t = e.target.closest('[data-page],[data-reset],[data-tt],[data-rp],[data-pg],[data-rppg],[data-export],[data-from],#rpExport,#rpClear,#refreshButton');
      if (!t) return;
      if (t.dataset.page) { setPage(t.dataset.page); }
      else if (t.dataset.reset != null) { state.filters[t.dataset.reset] = emptyF(); renderPage(); }
      else if (t.dataset.tt) { state.ttTab = t.dataset.tt; renderTuanThu(); }
      else if (t.dataset.rp) { state.report = findReport(t.dataset.rp); state.rpFrom = ''; state.rpTo = ''; state.rpPage = 1; renderBaoCao(); }
      else if (t.dataset.pg) { var s = t.dataset.pg; state.tblPage[s] = Math.max(1, (state.tblPage[s] || 1) + Number(t.dataset.dir)); renderPage(); }
      else if (t.dataset.rppg != null) { state.rpPage = Math.max(1, (state.rpPage || 1) + Number(t.dataset.rppg)); renderBaoCao(); }
      else if (t.dataset.export) { var type = t.dataset.export; exportExcel(type, type === 'xe' ? filterXe(state.filters.phuongtien) : filterNs(state.filters.nhansu)); }
      else if (t.dataset.from != null) { state.filters[t.dataset.scr].tuNgay = t.dataset.from; state.filters[t.dataset.scr].denNgay = t.dataset.to; renderPage(); }
      else if (t.id === 'rpExport') { exportExcel(state.report.type, state._rpRows || [], (state.report.source === 'table' || state.report.source === 'compute') ? state._rpCols : null, state.report.key + '_' + new Date().toISOString().slice(0, 10)); }
      else if (t.id === 'rpClear') { state.rpFrom = ''; state.rpTo = ''; state.rpPage = 1; renderBaoCao(); }
      else if (t.id === 'refreshButton') { loadData(); }
    });
    function findReport(key) { var r = null; REPORTS.forEach(function (g) { g.items.forEach(function (it) { if (it.key === key) r = it; }); }); return r; }

    /* =================== LOAD =================== */
    function loadData() {
      $('updatedAt').textContent = 'Đang tải dữ liệu…';
      $('page').innerHTML = '<div class="loading">Đang tải dữ liệu…</div>';
      fetch('/api/dashboard-qlvt', { headers: { Accept: 'application/json' } }).then(function (r) { return r.text().then(function (txt) { if (!r.ok) throw new Error('Không tải được dashboard (' + r.status + ').'); return txt ? JSON.parse(txt) : {}; }); })
        .then(function (data) {
          state.data = data; $('messages').innerHTML = '';
          if (data.missingSources && data.missingSources.length) showMessage('Một số bảng chưa đọc được: ' + data.missingSources.map(function (x) { return x.table; }).join(', ') + '.', 'warn');
          $('updatedAt').textContent = 'Cập nhật: ' + new Date(data.generatedAt || Date.now()).toLocaleString('vi-VN');
          renderPage();
        })
        .catch(function (err) { showMessage(err.message + '. Khi chạy local, hãy chạy npm run proxy.', 'error'); $('page').innerHTML = ''; });
    }
    loadData();
  </script>
</body>

</html>
