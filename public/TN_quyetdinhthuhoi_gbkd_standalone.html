<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quyết định thu hồi GPKD</title>
    <script src="/runtime-config.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
      :root {
        --brand: #b91c1c;
        --ink: #172033;
        --muted: #667085;
        --line: #e4e7ec;
        --bg: #f6f7f9;
      }

      @page {
        size: A4;
        margin: 1.5cm 1.5cm 1.5cm 2.5cm;
      }

      @page landscape {
        size: A4 landscape;
        margin: 1cm 1.5cm 1cm 2cm;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, sans-serif;
      }

      .shell {
        width: 100%;
        margin: 0 auto;
        padding: 12px;
      }

      .toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.96);
        padding: 14px;
        box-shadow: 0 10px 28px rgba(16, 24, 40, 0.06);
        backdrop-filter: blur(10px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand img {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        object-fit: contain;
      }

      h1 {
        margin: 0;
        font-size: 18px;
      }

      .status {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        min-height: 40px;
        border: 0;
        border-radius: 10px;
        background: var(--brand);
        color: #fff;
        cursor: pointer;
        font-weight: 700;
        padding: 0 14px;
      }

      button.secondary {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .preview {
        margin-top: 16px;
        overflow-x: hidden;
        overflow-y: visible;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #d8dde6;
        padding: 8px;
      }

      .page {
        width: 21cm;
        min-height: 29.7cm;
        margin: 0 auto 16px;
        background: #fff;
        padding: 1.5cm 1.5cm 1.5cm 2.5cm;
        color: #000;
        font-family: "Times New Roman", Times, serif;
        font-size: 14pt;
        line-height: 1.35;
        box-shadow: 0 16px 34px rgba(16, 24, 40, 0.2);
      }

      .landscape {
        width: 31.7cm;
        min-height: 21cm;
        padding: 1cm 1.5cm 1cm 2cm;
        page: landscape;
      }

      .preview .landscape {
        transform: scale(min(1, calc((100vw - 40px) / 1198)));
        transform-origin: top center;
        margin-bottom: calc((21cm * min(1, calc((100vw - 40px) / 1198))) - 21cm + 16px);
      }

      .header {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 20px;
        text-align: center;
      }

      .underline {
        display: inline-block;
        border-bottom: 1px solid #000;
        padding-bottom: 4px;
      }

      .center {
        text-align: center;
      }

      .right {
        text-align: right;
      }

      .footer {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 20px;
        margin-top: 20px;
      }

      .signature {
        text-align: center;
        font-weight: 700;
      }

      .signature-name {
        margin-top: 170px;
      }

      .title {
        margin: 24px 0 10px;
        text-align: center;
        font-size: 15pt;
        font-weight: 700;
        text-transform: uppercase;
      }

      .decision-title {
        margin: 18px 0;
        text-align: center;
        font-weight: 700;
        text-transform: uppercase;
      }

      p {
        margin: 8px 0;
      }

      table {
        width: 100%;
        table-layout: fixed;
        border-collapse: collapse;
        margin-top: 10px;
        font-size: 12pt;
      }

      .table-title {
        margin: 0 0 18px;
        text-align: center;
        font-size: 16pt;
        font-weight: 700;
        text-transform: uppercase;
      }

      .page-break {
        page-break-after: always;
      }

      th,
      td {
        border: 1px solid #000;
        padding: 5px;
        vertical-align: top;
        overflow-wrap: anywhere;
        word-break: normal;
      }

      th {
        text-align: center;
        font-weight: 700;
      }

      .message {
        margin-top: 16px;
        border: 1px dashed var(--line);
        border-radius: 12px;
        background: #fff;
        padding: 24px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 900px) {
        .shell {
          padding: 12px;
        }

        .toolbar {
          align-items: stretch;
          flex-direction: column;
        }

        .actions,
        .actions button {
          width: 100%;
        }

        .preview {
          padding: 10px;
        }

        .page {
          transform: scale(calc((100vw - 44px) / 793.7));
          transform-origin: top left;
          margin-left: 0;
          margin-bottom: calc(-29.7cm + (29.7cm * ((100vw - 44px) / 793.7)) + 16px);
        }

        .landscape {
          transform: scale(calc((100vw - 44px) / 1198));
          margin-bottom: calc(-21cm + (21cm * ((100vw - 44px) / 1198)) + 16px);
        }
      }

      @media print {
        html,
        body {
          width: auto !important;
          height: auto !important;
          overflow: visible !important;
          background: #fff;
        }

        .toolbar,
        .message {
          display: none !important;
        }

        .shell,
        .preview {
          margin: 0;
          padding: 0;
          border: 0;
          background: #fff;
          width: auto;
          overflow: visible;
        }

        .page {
          width: auto;
          min-height: 0;
          margin: 0;
          padding: 0;
          box-shadow: none;
          border: 0;
          page-break-after: always;
        }

        .landscape {
          width: auto;
          min-height: 0;
          padding: 0;
          transform: none !important;
          margin-bottom: 0 !important;
          page: landscape;
        }

        .page-break {
          display: none;
        }

        .page:last-child {
          page-break-after: auto;
        }
      }
    </style>
    <link rel="stylesheet" href="/document-preview-responsive.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div class="brand">
          <img src="/logo-taxi-123.png" alt="TAXI 123_HN" />
          <div>
            <h1>Quyết định thu hồi GPKD</h1>
            <div class="status" id="statusText">Đang kiểm tra tham số IDQuyetDinh.</div>
          </div>
        </div>
        <div class="actions">
          <button class="secondary" id="reloadButton" type="button">Tải lại</button>
          <button id="printButton" type="button" disabled>In tài liệu</button>
          <button id="exportWordButton" type="button" disabled>Xuất Word</button>
        </div>
      </section>

      <div class="message" id="messageBox" hidden></div>
      <section class="preview" id="preview" hidden>
        <article class="page" id="documentPage"></article>
      </section>
    </main>

    <script>
      const statusText = document.getElementById('statusText');
      const messageBox = document.getElementById('messageBox');
      const preview = document.getElementById('preview');
      const page = document.getElementById('documentPage');
      const reloadButton = document.getElementById('reloadButton');
      const printButton = document.getElementById('printButton');
      const exportWordButton = document.getElementById('exportWordButton');
      const decisionId = new URLSearchParams(window.location.search).get('IDQuyetDinh') || '';
      let currentPayload = null;

      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#039;'
        }[char]));
      }

      function parseDateValue(value) {
        if (!value) return null;
        if (value instanceof Date) {
          const dateValue = new Date(value.getTime());
          return Number.isNaN(dateValue.getTime()) ? null : dateValue;
        }

        const text = String(value).trim();
        if (!text) return null;

        const isoDateMatch = text.match(/^(\d{4})-(\d{1,2})-(\d{1,2})(?:[T\s].*)?$/);
        if (isoDateMatch) {
          const [, year, month, day] = isoDateMatch;
          const dateValue = new Date(Number(year), Number(month) - 1, Number(day));
          if (
            dateValue.getFullYear() === Number(year) &&
            dateValue.getMonth() === Number(month) - 1 &&
            dateValue.getDate() === Number(day)
          ) {
            return dateValue;
          }
        }

        const vietnameseDateMatch = text.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{4})(?:\s+.*)?$/);
        if (vietnameseDateMatch) {
          const [, day, month, year] = vietnameseDateMatch;
          const dateValue = new Date(Number(year), Number(month) - 1, Number(day));
          if (
            dateValue.getFullYear() === Number(year) &&
            dateValue.getMonth() === Number(month) - 1 &&
            dateValue.getDate() === Number(day)
          ) {
            return dateValue;
          }
        }

        const parsed = new Date(text);
        return Number.isNaN(parsed.getTime()) ? null : parsed;
      }

      function formatAdministrativeDate(value) {
        if (!value) return '';
        const date = parseDateValue(value);
        if (!date) return '';
        const day = String(date.getDate()).padStart(2, '0');
        const monthValue = date.getMonth() + 1;
        const month = monthValue <= 2 ? String(monthValue).padStart(2, '0') : String(monthValue);
        const year = String(date.getFullYear());
        return `${day}/${month}/${year}`;
      }

      function adminDate(value) {
        const date = value ? parseDateValue(value) : new Date();
        if (!date) return { day: '', month: '', year: '' };
        return {
          day: String(date.getDate()).padStart(2, '0'),
          month: date.getMonth() + 1 <= 2 ? String(date.getMonth() + 1).padStart(2, '0') : String(date.getMonth() + 1),
          year: String(date.getFullYear())
        };
      }

      function buildCanCu(refIds, canCuData) {
        if (!refIds) return [];
        let ids = [];
        try {
          const raw = String(refIds).trim();
          ids = raw.startsWith('[') ? JSON.parse(raw) : raw.split(',').map((item) => item.trim()).filter(Boolean);
        } catch {
          ids = String(refIds).split(',').map((item) => item.trim()).filter(Boolean);
        }

        return ids.map((id) => canCuData.find((item) => String(item.ID_CanCu || item.ID_CANCU || item.ID || '').trim() === String(id).trim()))
          .filter(Boolean)
          .map((item) => {
            const so = item.SoVanBan || item.SoKyHieu ? ` số ${item.SoVanBan || item.SoKyHieu}` : '';
            const ngay = item.NgayBanHanh ? ` ngày ${formatAdministrativeDate(item.NgayBanHanh)}` : '';
            const coQuan = item.CQBanHanh || item.CoQuanBanHanh ? ` của ${item.CQBanHanh || item.CoQuanBanHanh}` : '';
            const ten = item.TenVanBanDayDu || item.TrichYeu ? ` ${item.TenVanBanDayDu || item.TrichYeu}` : '';
            return `${item.LoaiVanBan || 'Văn bản'}${so}${ngay}${coQuan}${ten}`;
          });
      }

      function buildReason(item) {
        return [item.LyDoThuHoiDuaQD, item.LyDoThuHoiKhac ? `(${item.LyDoThuHoiKhac})` : ''].filter(Boolean).join(' ');
      }

      function getNguoiKyName(info) {
        return info?.TenNguoi || info?.HoTen || info?.NguoiPhuTrach || '';
      }

      function renderDocument(payload) {
        preview.querySelectorAll('.page-break, .landscape').forEach((node) => node.remove());

        const qd = payload.quyetDinh;
        const date = adminDate(qd.NgayKy);
        const tenTinh = escapeHtml(payload.tenTinh || '');
        const canCuHtml = payload.canCuList.length
          ? payload.canCuList.map((item) => `<p><em>Căn cứ ${escapeHtml(item)};</em></p>`).join('')
          : '<p><em>Căn cứ các quy định pháp luật hiện hành;</em></p>';

        page.innerHTML = `
          <div class="header">
            <div>
              <div>UBND TỈNH ${tenTinh.toUpperCase()}</div>
              <div class="underline"><strong>SỞ XÂY DỰNG</strong></div>
              <p>Số: ${escapeHtml(qd.SoQuyetDinh || qd.SoQD || '')}</p>
            </div>
            <div>
              <div><strong>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</strong></div>
              <div class="underline"><strong>Độc lập - Tự do - Hạnh phúc</strong></div>
              <p><em>${tenTinh}, ngày ${date.day} tháng ${date.month} năm ${date.year}</em></p>
            </div>
          </div>
          <div class="title">QUYẾT ĐỊNH</div>
          <p class="center"><strong>Về việc thu hồi Giấy phép kinh doanh vận tải bằng xe ô tô</strong></p>
          <div class="decision-title">GIÁM ĐỐC SỞ XÂY DỰNG TỈNH ${tenTinh.toUpperCase()}</div>
          ${canCuHtml}
          <p><em>Theo đề nghị của bộ phận chuyên môn.</em></p>
          <p class="center"><strong>QUYẾT ĐỊNH:</strong></p>
          <p><strong>Điều 1.</strong> Thu hồi Giấy phép kinh doanh vận tải bằng xe ô tô không thời hạn của ${payload.details.length} đơn vị <em>(có danh sách kèm theo)</em>.</p>
          <p><strong>Điều 2.</strong> Trong thời hạn 10 ngày kể từ ngày ký Quyết định này, các đơn vị có tên tại Điều 1 phải nộp lại Giấy phép kinh doanh về Sở Xây dựng tỉnh ${tenTinh} đồng thời dừng hoạt động kinh doanh vận tải theo quyết định thu hồi.</p>
          <p><strong>Điều 3.</strong> Quyết định này có hiệu lực kể từ ngày ký.</p>
          <p>Các Ông (Bà): Chánh Văn phòng Sở, Trưởng phòng Vận tải và An toàn giao thông, Chánh Thanh tra Sở, Thủ trưởng các đơn vị bị thu hồi Giấy phép và các đơn vị liên quan chịu trách nhiệm thi hành Quyết định này./.</p>
          <div class="footer">
            <div>
              <strong>Nơi nhận:</strong>
              <p>- Như Điều 3;</p>
              <p>- UBND tỉnh (b/c);</p>
              <p>- Công an tỉnh (p/h);</p>
              <p>- Cục Thuế tỉnh (p/h);</p>
              <p>- UBND các huyện, thị xã, TP; UBND các xã, phường, thị trấn nơi đơn vị đặt trụ sở (p/h);</p>
              <p>- Giám đốc Sở (b/c);</p>
              <p>- Văn phòng Sở;</p>
              <p>- Thanh tra Sở;</p>
              <p>- Lưu: VT, VTATGT.</p>
            </div>
            <div class="signature">
              <div>${escapeHtml(payload.thamQuyen || '')}</div>
              <div>${escapeHtml(payload.chucVu || '')}</div>
              <div class="signature-name">${escapeHtml(payload.nguoiKy || '')}</div>
            </div>
          </div>
        `;

        page.insertAdjacentHTML('afterend', `
          <div class="page-break"></div>
          <article class="page landscape">
            <div class="table-title">DANH SÁCH CÁC ĐƠN VỊ BỊ THU HỒI GIẤY PHÉP KINH DOANH VẬN TẢI BẰNG XE Ô TÔ</div>
            <p class="center"><em>Kèm theo Quyết định số ${escapeHtml(qd.SoQuyetDinh || qd.SoQD || '')}</em></p>
            <table>
              <thead>
                <tr>
                  <th>STT</th>
                  <th>Tên đơn vị</th>
                  <th>Địa chỉ</th>
                  <th>Số ĐKKD</th>
                  <th>Số GP KDVT</th>
                  <th>Ngày cấp</th>
                  <th>Loại hình vận tải</th>
                  <th>Lý do thu hồi</th>
                </tr>
              </thead>
              <tbody>${payload.details.map((item, index) => `<tr>
                <td class="center">${index + 1}</td>
                <td>${escapeHtml(item['Tên đơn vị'] || item.TenDonVi || item.Ten_don_vi || '')}</td>
                <td>${escapeHtml(item['Địa chỉ sau sáp nhập'] || item['Địa chỉ'] || item.DiaChi || '')}</td>
                <td>${escapeHtml(item['Số ĐKKD'] || item.SoDKKD || '')}</td>
                <td>${escapeHtml(item['Số GP KDVT'] || item.SoGPKDVT || item.SoGiayPhep || '')}</td>
                <td>${escapeHtml(formatAdministrativeDate(item['Ngày cấp'] || item.NgayCap || ''))}</td>
                <td>${escapeHtml(item['Loại hình vận tải'] || item.LoaiHinhVanTai || '')}</td>
                <td>${escapeHtml(buildReason(item))}</td>
              </tr>`).join('') || '<tr><td colspan="8" class="center">Không có chi tiết thu hồi.</td></tr>'}</tbody>
            </table>
          </article>
        `);
      }

      function showMessage(message) {
        messageBox.hidden = false;
        messageBox.textContent = message;
        preview.hidden = true;
        printButton.disabled = true;
        exportWordButton.disabled = true;
      }

      async function loadData() {
        currentPayload = null;
        reloadButton.disabled = true;
        printButton.disabled = true;
        exportWordButton.disabled = true;
        messageBox.hidden = true;
        statusText.textContent = 'Đang tải quyết định từ Google Sheets...';

        try {
          if (!decisionId) {
            throw new Error('Thiếu tham số IDQuyetDinh trên URL.');
          }

          const response = await fetch(`/api/quyet-dinh-thu-hoi-gpkd?IDQuyetDinh=${encodeURIComponent(decisionId)}`, {
            method: 'GET',
            headers: { Accept: 'application/json' }
          });
          const text = await response.text();
          const data = text ? JSON.parse(text) : {};
          if (!response.ok) throw new Error(data.error || 'Không tải được quyết định thu hồi GPKD.');
          const related = data.related || {};
          const quyetDinh = data.row || null;
          const details = Array.isArray(related.GPKD_THUHOI_CHITIET) ? related.GPKD_THUHOI_CHITIET : [];
          const provinceData = Array.isArray(related.ThongTin) ? related.ThongTin : [];
          const canCuData = Array.isArray(related.CANCU_PHAPLY) ? related.CANCU_PHAPLY : [];
          const signers = Array.isArray(related.NguoiPhuTrach) ? related.NguoiPhuTrach : [];
          if (!quyetDinh) {
            throw new Error(`Không tìm thấy quyết định với IDQuyetDinh = ${decisionId}.`);
          }

          let nguoiKy = '';
          const signer = signers.find((item) => String(item.IDNguoi || '').trim() === String(quyetDinh.NguoiKy || '').trim()) || null;
          nguoiKy = signer?.TenNguoi || signer?.HoTen || signer?.NguoiPhuTrach || '';

          renderDocument({
            quyetDinh,
            details: Array.isArray(details) ? details : [],
            tenTinh: Array.isArray(provinceData) && provinceData[0] ? provinceData[0].Tinh || '' : '',
            canCuList: buildCanCu(quyetDinh.Ref_CanCuPhapLy || '', Array.isArray(canCuData) ? canCuData : []),
            nguoiKy,
            thamQuyen: signer?.ThamQuyen || '',
            chucVu: signer?.ChucVu || ''
          });

          currentPayload = {
            quyetDinh,
            details: Array.isArray(details) ? details : [],
            tenTinh: Array.isArray(provinceData) && provinceData[0] ? provinceData[0].Tinh || '' : '',
            canCuList: buildCanCu(quyetDinh.Ref_CanCuPhapLy || '', Array.isArray(canCuData) ? canCuData : []),
            signer
          };

          statusText.textContent = `Đã tải quyết định ${decisionId}.`;
          preview.hidden = false;
          printButton.disabled = false;
          exportWordButton.disabled = false;
        } catch (error) {
          statusText.textContent = 'Không tải được quyết định.';
          showMessage(error.message || 'Không tải được quyết định.');
        } finally {
          reloadButton.disabled = false;
        }
      }

      async function exportToWordTemplate() {
        if (!currentPayload) return;

        exportWordButton.disabled = true;
        exportWordButton.textContent = 'Đang xuất...';

        try {
          const response = await fetch('/quyet_dinh_thu_hoi_gpkd_template.docx');
          if (!response.ok) {
            throw new Error('Không thể tải template Word.');
          }

          const templateContent = await response.arrayBuffer();
          const zip = new PizZip(templateContent);
          const Docxtemplater = window.docxtemplater?.Docxtemplater || window.docxtemplater;
          const doc = new Docxtemplater(zip, {
            paragraphLoop: true,
            linebreaks: true,
            nullGetter: () => ''
          });

          const qd = currentPayload.quyetDinh;
          const signedDate = adminDate(qd.NgayKy);
          const donViList = currentPayload.details.map((item, index) => ({
            stt: String(index + 1),
            ten_don_vi: item['Tên đơn vị'] || '',
            dia_chi: item['Địa chỉ sau sáp nhập'] || '',
            so_dkkd: item['Số ĐKKD'] || '',
            so_gp_kdvt: item['Số GP KDVT'] || '',
            ngay_cap: formatAdministrativeDate(item['Ngày cấp']),
            loai_hinh_van_tai: item['Loại hình vận tải'] || '',
            ly_do_thu_hoi: [item.LyDoThuHoiDuaQD, item.LyDoThuHoiKhac ? `(${item.LyDoThuHoiKhac})` : ''].filter(Boolean).join('\n'),
            can_cu_thu_hoi: item.CanCuThuHoiDuaQD || ''
          }));

          doc.render({
            tinh: currentPayload.tenTinh,
            tinh_upper: String(currentPayload.tenTinh || '').toUpperCase(),
            ngayKy: signedDate.day,
            thangKy: signedDate.month,
            nam: signedDate.year,
            so_don_vi: currentPayload.details.length,
            can_cu_list: currentPayload.canCuList.map((value) => ({ noi_dung: value })),
            tham_quyen_ky: currentPayload.signer?.ThamQuyen || '',
            chuc_vu_ky: currentPayload.signer?.ChucVu || '',
            can_cu_phap_ly: currentPayload.canCuList.map((value) => `Căn cứ ${value}`).join('\n'),
            nguoi_ky: getNguoiKyName(currentPayload.signer),
            don_vi_list: donViList
          });

          const blob = doc.getZip().generate({
            type: 'blob',
            mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
          });

          saveAs(blob, `Quyet_dinh_thu_hoi_GPKD_${qd.SoQuyetDinh || 'new'}.docx`);
        } catch (error) {
          showMessage(error.message || 'Không xuất được file Word.');
        } finally {
          exportWordButton.disabled = !currentPayload;
          exportWordButton.textContent = 'Xuất Word';
        }
      }

      reloadButton.addEventListener('click', loadData);
      printButton.addEventListener('click', () => window.print());
      exportWordButton.addEventListener('click', exportToWordTemplate);
      loadData();
    </script>
  </body>
</html>
