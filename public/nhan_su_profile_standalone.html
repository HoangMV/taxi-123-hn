<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ nhân sự điện tử</title>
    <style>
        /* ==== Toolbar / khung tải hồ sơ (không thuộc mẫu PDF) ==== */
        .ns-toolbar {
            max-width: 1180px;
            margin: 16px auto;
            padding: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 1px 2px rgba(15, 23, 42, .06);
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        }

        .ns-toolbar-row {
            display: flex;
            gap: 12px;
            align-items: end;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .ns-toolbar h1 {
            margin: 0;
            font-size: 25.96px;
            color: #0b2d5c;
        }

        .ns-toolbar .ns-subtitle {
            margin-top: 4px;
            color: #64748b;
            font-size: 16.52px;
            font-weight: 600;
        }

        .ns-actions {
            display: flex;
            gap: 8px;
            align-items: end;
            flex-wrap: wrap;
        }

        .ns-actions input {
            height: 40px;
            min-width: 240px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 0 10px;
            outline: none;
            font: inherit;
        }

        .ns-actions input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
        }

        .ns-btn {
            height: 40px;
            min-width: 130px;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 0 12px;
            font-weight: 600;
            cursor: pointer;
            font: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .ns-btn:disabled {
            cursor: not-allowed;
            opacity: .7;
        }

        .ns-btn.primary {
            background: #2563eb;
            color: #fff;
        }

        .ns-btn.green {
            background: #059669;
            color: #fff;
        }

        .ns-spinner {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, .35);
            border-top-color: #fff;
            animation: ns-spin .6s linear infinite;
        }

        @keyframes ns-spin {
            to {
                transform: rotate(360deg);
            }
        }

        .ns-message {
            max-width: 1180px;
            margin: 0 auto 12px;
            padding: 12px 14px;
            border-radius: 10px;
            font-weight: 600;
            font-family: ui-sans-serif, system-ui, sans-serif;
        }

        .ns-message.error {
            border: 1px solid #fecaca;
            background: #fef2f2;
            color: #b91c1c;
        }

        .ns-message.warn {
            border: 1px solid #fde68a;
            background: #fffbeb;
            color: #92400e;
        }

        .ns-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, .55);
        }

        .ns-overlay[hidden] {
            display: none;
        }

        .ns-overlay-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 32px 40px;
            border-radius: 14px;
            background: #fff;
            font-family: ui-sans-serif, system-ui, sans-serif;
        }

        .ns-overlay-spinner {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 5px solid #d1e3f8;
            border-top-color: #2563eb;
            animation: ns-spin .8s linear infinite;
        }

        .ns-overlay-text {
            color: #172033;
            font-size: 17.7px;
            font-weight: 600;
        }

        .ns-loading {
            max-width: 1180px;
            margin: 0 auto;
            display: grid;
            gap: 14px;
        }

        .ns-skeleton {
            border-radius: 8px;
            background: linear-gradient(90deg, #e2e8f0 25%, #f8fafc 45%, #e2e8f0 65%);
            background-size: 220% 100%;
            animation: ns-pulse 1.2s infinite;
        }

        .ns-loading-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: auto;
            color: #1f4e79;
            font-size: 13px;
            font-weight: 700;
            font-family: ui-sans-serif, system-ui, sans-serif;
        }
        .ns-loading-text .ns-spinner { border-width: 3px; }

        @keyframes ns-pulse {
            0% {
                background-position: 100% 0;
            }

            100% {
                background-position: -100% 0;
            }
        }

        .ns-doc-shell {
            display: flex;
            justify-content: center;
        }

        @media print {

            .ns-toolbar,
            .ns-message,
            .no-print {
                display: none !important;
            }
        }

        /* ==== Khung trang A4 DỌC - render ở KÍCH THƯỚC THẬT (không scale) để chữ nét như bản gốc ==== */
        #docArea.doc {
            width: auto;
            box-shadow: none;
            background: transparent;
        }

        .ns-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .ns-a4 {
            width: 210mm;
            height: 297mm;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #cfd9e6;
            box-shadow: 0 18px 42px rgba(15, 23, 42, .14);
            overflow: hidden;
            position: relative;
            box-sizing: border-box;
            flex: 0 0 auto;
        }

        .ns-a4-inner {
            width: 210mm;
            height: 297mm;
            padding: 10mm;
            box-sizing: border-box;
            position: relative;
            background: #fff;
        }

        .ns-a4-inner.page {
            min-height: auto !important;
            height: 297mm !important;
            margin: 0 !important;
            box-shadow: none !important;
            padding: 10mm !important;
            overflow: visible;
        }

        .ns-a4-inner.page:before {
            display: none !important;
        }

        .ns-a4-num {
            position: absolute;
            right: 10mm;
            bottom: 4mm;
            color: #9fb2c8;
            font-size: 10.62px;
            font-weight: 600;
        }

        /* Khối ký + chú thích đi liền nhau, không bị tách/cắt; chừa chỗ ký rõ ràng. */
        .ns-signoff {
            margin-top: 14px;
        }

        .ns-signoff .signature {
            margin-top: 0;
        }

        .ns-signoff .sig {
            height: 56px !important;
        }

        /* Sandbox đo: rộng đúng vùng nội dung 190mm như trong trang thật. */
        .ns-measure {
            position: absolute;
            left: -99999px;
            top: 0;
            visibility: hidden;
        }

        .ns-measure .ns-content {
            width: 190mm;
        }

        @media print {
            .ns-profile {
                gap: 0;
            }

            .ns-a4 {
                width: 210mm !important;
                height: 297mm !important;
                margin: 0 !important;
                border: 0 !important;
                box-shadow: none !important;
                page-break-after: always;
                aspect-ratio: auto;
            }

            .ns-a4:last-child {
                page-break-after: auto;
            }

            @page {
                size: A4 portrait;
                margin: 0;
            }
        }

        body.ns-pdf-export .ns-a4 {
            border: 0 !important;
            box-shadow: none !important;
        }

        body.ns-pdf-export .ns-a4-num {
            display: none;
        }

        :root {
            --ink: #111827;
            --muted: #667085;
            --line: #98A2B3;
            --line2: #CBD5E1;
            --paper: #FFFFFF;
            --bg: #F5F7FA;
            --navy: #0B1F3A;
            --navy2: #123A63;
            --blue: #175CD3;
            --green: #067647;
            --amber: #B54708;
            --red: #B42318;
            --slate: #344054;
            --teal: #0E7090;
            --gold: #C8A24A;
        }

        @page {
            size: A4 portrait;
            margin: 0;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            background: #E6EAF0;
            color: var(--ink);
            /* Đồng nhất font với trang phương tiện (vehicle_profile_standalone.html). */
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 11.45px;
            line-height: 1.35;
        }

        .doc {
            width: 190mm;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 18px 50px rgba(16, 24, 40, .14);
        }

        .page {
            position: relative;
            min-height: 277mm;
            padding: 10mm 10mm 11mm 10mm;
            background: var(--paper);
            page-break-after: always;
            overflow: hidden;
        }

        .page:last-child {
            page-break-after: auto;
        }

        .page:before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--navy), var(--blue), var(--gold));
        }

        .wm {
            position: absolute;
            right: -26mm;
            bottom: 32mm;
            transform: rotate(-90deg);
            font-size: 41.3px;
            letter-spacing: 6px;
            font-weight: 600;
            color: rgba(11, 31, 58, .035);
            white-space: nowrap;
        }

        .keep {
            page-break-inside: avoid;
            break-inside: avoid;
        }

        /* International dossier header */
        .cover {
            display: grid;
            grid-template-columns: 1fr 168px;
            gap: 14px;
            align-items: stretch;
            border: 1px solid #101828;
            border-radius: 0;
            margin-bottom: 12px;
            background: #fff;
        }

        .cover-main {
            padding: 16px 17px 15px;
            border-right: 1px solid #101828;
            position: relative;
        }

        .cover-main:after {
            content: "";
            position: absolute;
            left: 17px;
            right: 17px;
            bottom: 0;
            height: 1px;
            background: var(--gold);
        }

        .org {
            font-size: 9.44px;
            text-transform: uppercase;
            letter-spacing: 1.9px;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .title {
            font-size: 29.5px;
            line-height: 1.04;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: .1px;
            color: #0B1F3A;
            margin: 0 0 7px;
        }

        .subtitle {
            font-size: 12.27px;
            color: #475467;
            max-width: 520px;
        }

        .scope-line {
            margin-top: 12px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .scope-tag {
            border: 1px solid var(--line);
            border-left: 3px solid var(--navy);
            padding: 4px 7px;
            font-size: 9.44px;
            font-weight: 600;
            text-transform: uppercase;
            color: #344054;
            background: #F9FAFB;
        }

        .cover-meta {
            padding: 13px 12px;
            background: #F9FAFB;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .meta-row {
            border-bottom: 1px solid var(--line2);
            padding: 0 0 7px;
            margin-bottom: 7px;
        }

        .meta-row:last-child {
            border-bottom: 0;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .meta-k {
            font-size: 8.61px;
            text-transform: uppercase;
            letter-spacing: 1.1px;
            color: #667085;
            font-weight: 600;
        }

        .meta-v {
            font-size: 11.8px;
            font-weight: 600;
            color: #101828;
            margin-top: 2px;
            word-break: break-word;
        }

        /* Identity executive block */
        .identity {
            display: grid;
            grid-template-columns: 95px 1fr 230px;
            gap: 10px;
            margin-bottom: 11px;
            align-items: stretch;
        }

        .photo-card {
            border: 1px solid var(--line);
            background: #fff;
            padding: 5px;
        }

        .portrait {
            width: 100%;
            height: 120px;
            display: block;
            object-fit: cover;
            border: 1px solid var(--line2);
        }

        .portrait-empty {
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px dashed #98A2B3;
            background: #F9FAFB;
            color: #344054;
        }

        .portrait-empty b {
            font-size: 30.68px;
            line-height: 1;
        }

        .portrait-empty span {
            font-size: 8.85px;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 6px;
            color: #667085;
        }

        .bio-card {
            border: 1px solid var(--line);
            padding: 12px 13px;
            background: #fff;
        }

        .person-kicker {
            font-size: 8.73px;
            text-transform: uppercase;
            letter-spacing: 1.3px;
            font-weight: 600;
            color: #667085;
            margin-bottom: 5px;
        }

        .name {
            font-size: 24.78px;
            text-transform: uppercase;
            font-weight: 600;
            color: #101828;
            line-height: 1.05;
            margin-bottom: 5px;
        }

        .role {
            font-size: 12.39px;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 7px;
        }

        .unit {
            font-size: 10.86px;
            color: #475467;
            margin-bottom: 8px;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .quick {
            border: 1px solid var(--line2);
            background: #F9FAFB;
            padding: 6px 7px;
            min-height: 39px;
        }

        .quick .k {
            font-size: 8.26px;
            text-transform: uppercase;
            letter-spacing: .75px;
            color: #667085;
            font-weight: 600;
        }

        .quick .v {
            font-size: 11.21px;
            font-weight: 600;
            color: #101828;
            margin-top: 2px;
            word-break: break-word;
        }

        .decision-card {
            border: 2px solid #101828;
            background: #fff;
            position: relative;
            padding: 11px 11px 10px;
        }

        .decision-card.good {
            border-color: var(--green);
        }

        .decision-card.warn {
            border-color: var(--amber);
        }

        .decision-card.bad {
            border-color: var(--red);
        }

        .decision-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--line);
            padding-bottom: 7px;
            margin-bottom: 7px;
        }

        .decision-title {
            font-size: 9.44px;
            text-transform: uppercase;
            letter-spacing: 1.3px;
            font-weight: 600;
            color: #344054;
        }

        .decision-code {
            font-size: 8.85px;
            text-transform: uppercase;
            font-weight: 600;
            border: 1px solid var(--line);
            padding: 3px 5px;
            background: #F9FAFB;
            color: #344054;
        }

        .decision-main {
            font-size: 15.34px;
            line-height: 1.18;
            text-transform: uppercase;
            font-weight: 600;
            color: #101828;
            margin-bottom: 8px;
        }

        .control-list {
            display: grid;
            gap: 4px;
        }

        .control-item {
            display: grid;
            grid-template-columns: 82px 1fr;
            gap: 6px;
            align-items: center;
            border-top: 1px solid #EAECF0;
            padding-top: 4px;
        }

        .control-item:first-child {
            border-top: 0;
            padding-top: 0;
        }

        .control-item .k {
            font-size: 9.44px;
            color: #667085;
            font-weight: 600;
        }

        .control-item .v {
            text-align: right;
        }

        .evidence-note {
            margin-top: 8px;
            border-top: 1px solid var(--line);
            padding-top: 6px;
            font-size: 9.2px;
            color: #667085;
            line-height: 1.3;
        }

        /* Dossier sections */
        .matrix {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 9px;
            margin-bottom: 10px;
        }

        .module {
            border: 1px solid var(--line);
            background: #fff;
            margin-bottom: 10px;
            page-break-inside: avoid;
        }

        .module-head {
            display: grid;
            grid-template-columns: 34px 1fr;
            align-items: stretch;
            border-bottom: 1px solid #101828;
        }

        .module-no {
            background: #101828;
            color: #fff;
            font-size: 13.81px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .module-titlebox {
            padding: 8px 10px;
            background: #F8FAFC;
        }

        .module-title {
            font-size: 12.21px;
            text-transform: uppercase;
            letter-spacing: .2px;
            font-weight: 600;
            color: #101828;
        }

        .module-note {
            font-size: 8.5px;
            color: #667085;
            margin-top: 2px;
        }

        .module.legal .module-no {
            background: var(--green);
        }

        .module.admin .module-no {
            background: var(--blue);
        }

        .module.risk .module-no {
            background: var(--amber);
        }

        .module.record .module-no {
            background: var(--teal);
        }

        .module.timeline .module-no {
            background: #6941C6;
        }

        .module-body {
            padding: 9px 10px;
        }

        .card-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .card-grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .standard-card {
            border: 1px solid var(--line);
            background: #fff;
            min-height: 104px;
            position: relative;
        }

        .standard-card:before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #98A2B3;
        }

        .standard-card.legal:before {
            background: var(--green);
        }

        .standard-card.admin:before {
            background: var(--blue);
        }

        .standard-card.risk:before {
            background: var(--amber);
        }

        .standard-card.record:before {
            background: var(--teal);
        }

        .standard-card-inner {
            padding: 8px 9px 8px 12px;
        }

        .card-label {
            font-size: 9.2px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #667085;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .card-status {
            min-height: 22px;
            margin-bottom: 5px;
        }

        .card-detail {
            font-size: 10.38px;
            color: #344054;
            line-height: 1.38;
        }

        .card-detail b {
            color: #101828;
        }

        .meaning {
            margin-top: 7px;
            padding-top: 6px;
            border-top: 1px solid #EAECF0;
            font-size: 9.2px;
            color: #667085;
            line-height: 1.3;
        }

        .risk-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 7px;
        }

        .riskbox {
            border: 1px solid var(--line);
            background: #FFFCF5;
            text-align: center;
            padding: 8px 4px;
        }

        .riskbox .num {
            font-size: 23.6px;
            line-height: 1;
            font-weight: 600;
            color: #92400E;
        }

        .riskbox .txt {
            font-size: 8.97px;
            text-transform: uppercase;
            letter-spacing: .45px;
            color: #667085;
            font-weight: 600;
            margin-top: 5px;
        }

        .risk-caption {
            font-size: 9.44px;
            color: #667085;
            margin-top: 7px;
            border-top: 1px solid #EAECF0;
            padding-top: 6px;
        }

        /* Badges */
        .badge,
        .micro {
            display: inline-block;
            border-radius: 2px;
            border: 1px solid var(--line);
            font-weight: 600;
            white-space: nowrap;
        }

        .badge {
            font-size: 10.27px;
            padding: 3px 6px;
        }

        .micro {
            font-size: 8.85px;
            padding: 2px 5px;
        }

        .good-b {
            background: #ECFDF3;
            color: #067647;
            border-color: #ABEFC6;
        }

        .warn-b {
            background: #FFFAEB;
            color: #B54708;
            border-color: #FEDF89;
        }

        .bad-b {
            background: #FEF3F2;
            color: #B42318;
            border-color: #FECDCA;
        }

        .neutral-b {
            background: #F2F4F7;
            color: #344054;
            border-color: #D0D5DD;
        }

        /* Tables */
        table {
            border-collapse: collapse;
            width: 100%;
        }

        .kv td {
            border-bottom: 1px solid #EAECF0;
            padding: 5px 4px;
            vertical-align: top;
        }

        .kv td:first-child {
            width: 112px;
            color: #667085;
            font-weight: 600;
        }

        .kv td:last-child {
            font-weight: 600;
            color: #101828;
        }

        .two {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .panel {
            border: 1px solid var(--line);
            background: #fff;
        }

        .panel-head {
            padding: 7px 8px;
            border-bottom: 1px solid var(--line);
            background: #F8FAFC;
            text-transform: uppercase;
            font-size: 10.03px;
            font-weight: 600;
            color: #101828;
            letter-spacing: .4px;
        }

        .panel-body {
            padding: 5px 8px 7px;
        }

        .data {
            font-size: 9.68px;
            border: 1px solid var(--line);
        }

        .data th {
            background: #101828;
            color: #fff;
            text-transform: uppercase;
            font-size: 7.65px;
            letter-spacing: .25px;
            padding: 5px 5px;

<body>
    <div id="pdfOverlay" class="ns-overlay no-print" hidden>
        <div class="ns-overlay-box">
            <div class="ns-overlay-spinner"></div>
            <div class="ns-overlay-text">Đang tạo PDF, vui lòng đợi...</div>
        </div>
    </div>

    <div class="ns-toolbar no-print">
        <div class="ns-toolbar-row">
            <div>
                <h1>Hồ sơ nhân sự điện tử</h1>
                <p class="ns-subtitle">Nhập ID nhân sự, CCCD hoặc họ tên để tìm hồ sơ.</p>
            </div>
            <div class="ns-actions">
                <input id="idInput" placeholder="Nhập ID_NhanSu / CCCD / họ tên">
                <button class="ns-btn primary" type="button" id="loadButton">Tải hồ sơ</button>
                <button class="ns-btn green" type="button" id="pdfButton" disabled>Tải PDF</button>
            </div>
        </div>
    </div>
    <div id="message"></div>
    <main id="app" class="ns-doc-shell"></main>

    <script>
        const HTML2CANVAS_URL = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        const JSPDF_URL = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        const QRCODE_URL = 'https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js';
        const state = { bundle: null, loadingPdf: false, pdfLibPromise: null, qrLibPromise: null, requestSeq: 0 };
        const app = document.getElementById('app');
        const message = document.getElementById('message');
        const idInput = document.getElementById('idInput');
        const loadButton = document.getElementById('loadButton');
        const pdfButton = document.getElementById('pdfButton');
        const pdfOverlay = document.getElementById('pdfOverlay');

        /* ===== Helpers port từ scriptlet template (giữ nguyên hành vi) ===== */
        function clean(v) { return v == null ? '' : String(v).trim(); }
        function escapeHtml(v) { return clean(v).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
        function val(v, f) { if (v === undefined || v === null || v === '') return f === undefined ? '' : f; return v; }
        function g(obj, path, f) { try { let cur = obj; const parts = String(path || '').split('.'); for (let i = 0; i < parts.length; i++) { if (cur == null) return f || ''; cur = cur[parts[i]]; } return val(cur, f); } catch (e) { return f || ''; } }
        function lowerText(s) { return String(s || '').toLowerCase(); }
        function cls(s) { const x = lowerText(s); if (!x) return 'neutral-b'; if (x.indexOf('quá hạn') >= 0 || x.indexOf('hết hạn') >= 0 || x.indexOf('lỗi') >= 0 || x.indexOf('không đủ') >= 0 || x.indexOf('không hợp lệ') >= 0 || x.indexOf('không khớp') >= 0) return 'bad-b'; if (x.indexOf('chưa') >= 0 || x.indexOf('không') >= 0 || x.indexOf('cần') >= 0 || x.indexOf('thiếu') >= 0 || x.indexOf('sắp') >= 0 || x.indexOf('cảnh báo') >= 0 || x.indexOf('tạm') >= 0 || x.indexOf('chờ') >= 0) return 'warn-b'; if (x.indexOf('còn') >= 0 || x.indexOf('đang') >= 0 || x.indexOf('đủ') >= 0 || x.indexOf('có dữ liệu') >= 0 || x.indexOf('hiệu lực') >= 0 || x.indexOf('đạt') >= 0) return 'good-b'; return 'neutral-b'; }
        function initials(name) { const a = String(name || '').trim().split(/\s+/).filter(Boolean); if (!a.length) return 'NS'; return (a[0][0] + (a.length > 1 ? a[a.length - 1][0] : '')).toUpperCase(); }
        function dateOnly(v) { const s = String(v || ''); return s.replace(/(\d{1,2}\/\d{1,2}\/\d{4})(?:\s+\d{1,2}:\d{2}(?::\d{2})?)?/g, '$1'); }
        function showMessage(text, type) { message.innerHTML = text ? `<div class="ns-message ${type || 'warn'}">${escapeHtml(text)}</div>` : ''; }
        function script(src) { return new Promise((resolve, reject) => { const s = document.createElement('script'); s.src = src; s.onload = resolve; s.onerror = reject; document.head.appendChild(s); }); }
        function getParam(names) { const params = new URLSearchParams(window.location.search); for (const name of names) { const v = clean(params.get(name)); if (v) return v; } return ''; }

        function normalizeLabelV78(label) { return String(label || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/đ/g, 'd').replace(/[^a-z0-9]+/g, ' ').trim(); }
        function isXeLabel(label) { return String(label || '').trim().toLowerCase() === 'xe'; }
        function displayCellValue(label, value) { let cv = val(value, ''); const l = String(label || '').toLowerCase(); if (l.indexOf('ngày') >= 0 || l.indexOf('thời gian') >= 0) cv = dateOnly(cv); return cv; }
        function cellClassV78(label) { const x = normalizeLabelV78(label); if (x.indexOf('ngay') >= 0 || x === 'tu ngay' || x === 'den ngay') return 'col-date nowrap'; if (x === 'xe') return 'col-xe nowrap'; if (x === 'trang thai') return 'col-status nowrap'; if (x === 'don vi') return 'col-donvi'; return ''; }
        function statusTextV84(s) { const v = String(s || '').trim(); if (!v) return 'Chưa có dữ liệu'; if (lowerText(v).indexOf('còn hiệu lực') >= 0) return v.replace(/còn hiệu lực/gi, 'Đang hiệu lực'); return v; }

        function xeHienTaiFallback() { const xe = g(data0(), 'operation.xePhanCong', ''); if (!xe || lowerText(xe).indexOf('chưa') >= 0) return ''; return xe; }
        function data0() { return data || (state.bundle ? state.bundle.profile : {}); }

        function shouldHideColumnV78(tableType, label, rows) {
            const x = normalizeLabelV78(label);
            if (tableType === 'qtct') { if (x === 'bo phan' || x === 'chuc danh' || x === 'loai cong viec') return true; }
            if (tableType === 'hdld') {
                if (x === 'ngay het han' || x === 'den ngay') {
                    let allKxdth = true;
                    (rows || []).forEach((r) => {
                        let loai = '';
                        (r.cells || []).forEach((c) => { const lx = normalizeLabelV78(c.label); if (lx === 'loai hd' || lx === 'loai hop dong' || lx === 'loai hop dong lao dong') loai = String(c.value || ''); });
                        if (normalizeLabelV78(loai).indexOf('khong xac dinh thoi han') < 0) allKxdth = false;
                    });
                    if (allKxdth) return true;
                }
            }
            if (tableType === 'ttds') { if (x === 'dat coc' || x === 'so tien dat coc' || x === 'tien dat coc') return true; }
            if (tableType === 'suckhoe') { if (x === 'so ho so' || x === 'ma ho so') return true; }
            return false;
        }
        function tableTypeFromTitleV78(title) {
            const x = normalizeLabelV78(title);
            if (x.indexOf('qua trinh cong tac') >= 0 || x.indexOf('phan cong xe') >= 0) return 'qtct';
            if (x.indexOf('hop dong lao dong') >= 0) return 'hdld';
            if (x.indexOf('thoa thuan dan su') >= 0) return 'ttds';
            if (x.indexOf('suc khoe') >= 0) return 'suckhoe';
            return 'normal';
        }

        function renderRowsByTypeV78(rows, tableType, extraClass) {
            if (!rows || rows.length === 0) return '<div class="empty">Chưa phát sinh dữ liệu.</div>';
            let labels = [];
            if (rows[0] && rows[0].cells) labels = rows[0].cells.map((c) => c.label).filter((l) => !shouldHideColumnV78(tableType, l, rows));
            const head = `<thead><tr><th style="width:32px;text-align:center;">STT</th>${labels.map((l) => `<th class="${cellClassV78(l)}">${escapeHtml(l)}</th>`).join('')}</tr></thead>`;
            const body = rows.map((r, idx) => {
                const cells = (r.cells || []).filter((c) => !shouldHideColumnV78(tableType, c.label, rows)).map((c) => {
                    const cv = displayCellValue(c.label, c.value);
                    return `<td class="${cellClassV78(c.label)}">${escapeHtml(cv)}</td>`;
                }).join('');
                return `<tr><td style="text-align:center;font-weight:600;">${escapeHtml(val(r.stt, idx + 1))}</td>${cells}</tr>`;
            }).join('');
            return `<table class="data compact ${extraClass || ''}"><thead>${head.replace(/^<thead>|<\/thead>$/g, '')}</thead><tbody>${body}</tbody></table>`;
        }
        function renderRows(rows) { return renderRowsByTypeV78(rows, 'normal', ''); }

        function renderRowsQtct(rows) {
            if (!rows || rows.length === 0) return '<div class="empty">Chưa phát sinh dữ liệu.</div>';
            const xeFallback = xeHienTaiFallback();
            const note = xeFallback ? `<div class="qtct-note">Xe đang phân công hiện tại: <span class="vehicle-chip">${escapeHtml(xeFallback)}</span></div>` : '';
            let labels = [];
            if (rows[0] && rows[0].cells) labels = rows[0].cells.map((c) => c.label).filter((l) => !shouldHideColumnV78('qtct', l, rows));
            const head = `<tr><th style="width:32px;text-align:center;">STT</th>${labels.map((l) => `<th class="${cellClassV78(l)}">${escapeHtml(l)}</th>`).join('')}</tr>`;
            const body = rows.map((r, idx) => {
                const cells = (r.cells || []).filter((c) => !shouldHideColumnV78('qtct', c.label, rows)).map((c) => {
                    let cv = displayCellValue(c.label, c.value);
                    if (isXeLabel(c.label) && !cv) cv = xeFallback;
                    const inner = (isXeLabel(c.label) && cv) ? `<span class="vehicle-chip">${escapeHtml(cv)}</span>` : escapeHtml(cv);
                    return `<td class="${cellClassV78(c.label)}">${inner}</td>`;
                }).join('');
                return `<tr><td style="text-align:center;font-weight:600;">${escapeHtml(val(r.stt, idx + 1))}</td>${cells}</tr>`;
            }).join('');
            return `${note}<table class="data compact qtct-table"><thead>${head}</thead><tbody>${body}</tbody></table>`;
        }

        function renderOptionalTable(title, rows, clsName, no, note) {
            if (!rows || rows.length === 0) return '';
            const tableType = tableTypeFromTitleV78(title);
            let extraClass = '';
            if (tableType === 'hdld') extraClass = 'hdld-table';
            if (tableType === 'ttds') extraClass = 'ttds-table';
            if (tableType === 'suckhoe') extraClass = 'suckhoe-table';
            return `<div class="module ${clsName || 'record'} keep">
        <div class="module-head"><div class="module-no">${escapeHtml(no)}</div>
        <div class="module-titlebox"><div class="module-title">${escapeHtml(title)}</div><div class="module-note">${escapeHtml(note || 'Dữ liệu phát sinh của nhân sự')}</div></div></div>
        <div class="module-body">${renderRowsByTypeV78(rows, tableType, extraClass)}</div></div>`;
        }

        /* ===== Kết luận 04 tiêu chí (V80) + thẻ tiêu chí/rủi ro (V81/V79) ===== */
        function criteriaStatusLevelV80(item) {
            const s = normalizeLabelV78(String((item && item.status) || '') + ' ' + String((item && item.statusClass) || ''));
            if (!s) return 'WARN';
            if (s.indexOf('bad') >= 0 || s.indexOf('qua han') >= 0 || s.indexOf('het han') >= 0 || s.indexOf('khong du') >= 0 || s.indexOf('loi') >= 0) return 'BAD';
            if (s.indexOf('warn') >= 0 || s.indexOf('chua') >= 0 || s.indexOf('thieu') >= 0 || s.indexOf('sap') >= 0 || s.indexOf('tam') >= 0 || s.indexOf('cho hieu luc') >= 0) return 'WARN';
            if (s.indexOf('ok') >= 0 || s.indexOf('con hieu luc') >= 0 || s.indexOf('dang hieu luc') >= 0 || s.indexOf('dang tham gia') >= 0 || s.indexOf('du') >= 0 || s.indexOf('dat') >= 0 || s.indexOf('hieu luc') >= 0) return 'OK';
            return 'WARN';
        }
        function driverCriteriaV80() {
            const list = g(data0(), 'conditionChecklist', []) || [];
            let out = list.slice(0, 4);
            if (out.length < 4) {
                out = [
                    { item: 'GPLX', status: g(data0(), 'status.gplx', 'Chưa có dữ liệu') },
                    { item: 'Sức khỏe', status: g(data0(), 'status.sucKhoe', 'Chưa có dữ liệu') },
                    { item: 'Đào tạo / tập huấn', status: g(data0(), 'status.daoTao', 'Chưa có dữ liệu') },
                    { item: 'HĐLĐ', status: g(data0(), 'status.hopDong', 'Chưa có dữ liệu') }
                ];
            }
            return out.slice(0, 4);
        }
        function driverCriteriaSummaryV80() {
            const list = driverCriteriaV80();
            let ok = 0, bad = 0, warn = 0; const missing = [];
            list.forEach((x) => {
                const lv = criteriaStatusLevelV80(x);
                const name = String((x && x.item) || (x && x.noiDung) || 'Tiêu chí').trim();
                if (lv === 'OK') ok++; else { if (lv === 'BAD') bad++; else warn++; missing.push(name); }
            });
            return { total: 4, ok, bad, warn, missing, percent: Math.round((ok / 4) * 100) };
        }
        function decisionCssV80() { const s = driverCriteriaSummaryV80(); if (s.bad > 0) return 'bad'; if (s.warn > 0) return 'warn'; return 'ok'; }
        function decisionIconV80() { const c = decisionCssV80(); return c === 'ok' ? '✓' : c === 'bad' ? '×' : '!'; }
        function conclusionTextV80() { const s = driverCriteriaSummaryV80(); if (s.bad > 0) return 'CHƯA ĐỦ ĐIỀU KIỆN LÁI XE'; if (s.warn > 0) return 'CẦN KIỂM TRA / BỔ SUNG DỮ LIỆU'; return 'ĐỦ ĐIỀU KIỆN LÁI XE'; }
        function missingItemsTextV80() { const s = driverCriteriaSummaryV80(); if (!s.missing.length) return '04/04 tiêu chí bắt buộc đã đạt: GPLX, Sức khỏe, Đào tạo/tập huấn, HĐLĐ'; return s.missing.join('; '); }
        function completeTextV80() { const s = driverCriteriaSummaryV80(); return s.ok + '/4 tiêu chí bắt buộc đạt'; }
        function completePercentV80() { return driverCriteriaSummaryV80().percent; }

        function criterionLevelV81(item) {
            const st = lowerText((item && item.status) || ''); const sc = lowerText((item && item.statusClass) || '');
            if (sc.indexOf('bad') >= 0) return 'bad'; if (sc.indexOf('warn') >= 0) return 'warn'; if (sc.indexOf('ok') >= 0 || sc.indexOf('good') >= 0) return 'ok';
            if (st.indexOf('quá hạn') >= 0 || st.indexOf('hết hạn') >= 0 || st.indexOf('không đủ') >= 0 || st.indexOf('không hiệu lực') >= 0) return 'bad';
            if (st.indexOf('chưa') >= 0 || st.indexOf('thiếu') >= 0 || st.indexOf('cần') >= 0 || st.indexOf('sắp') >= 0 || st.indexOf('tạm') >= 0 || st.indexOf('chờ') >= 0) return 'warn';
            if (st.indexOf('còn') >= 0 || st.indexOf('đang') >= 0 || st.indexOf('đủ') >= 0 || st.indexOf('hiệu lực') >= 0) return 'ok';
            return 'warn';
        }
        function criteriaCardsV81() {
            const list = g(data0(), 'conditionChecklist', []) || [];
            let out = [];
            for (let i = 0; i < list.length && out.length < 4; i++) {
                out.push({ item: list[i].item || list[i].name || '', status: list[i].status || 'Chưa có dữ liệu', info: list[i].info || list[i].thongTin || '—', css: criterionLevelV81(list[i]) });
            }
            if (out.length < 4) {
                out = [
                    { item: 'GPLX', status: g(data0(), 'status.gplx', 'Chưa có dữ liệu'), info: '—', css: criterionLevelV81({ status: g(data0(), 'status.gplx', '') }) },
                    { item: 'Sức khỏe', status: g(data0(), 'status.sucKhoe', 'Chưa có dữ liệu'), info: '—', css: criterionLevelV81({ status: g(data0(), 'status.sucKhoe', '') }) },
                    { item: 'Đào tạo / tập huấn', status: g(data0(), 'status.daoTao', 'Chưa có dữ liệu'), info: '—', css: criterionLevelV81({ status: g(data0(), 'status.daoTao', '') }) },
                    { item: 'HĐLĐ', status: g(data0(), 'status.hopDong', 'Chưa có dữ liệu'), info: '—', css: criterionLevelV81({ status: g(data0(), 'status.hopDong', '') }) }
                ];
            }
            return out.slice(0, 4);
        }
        function arrLenV79(path) { const a = g(data0(), path, []); return (a && a.length) ? a.length : 0; }
        function riskItemsSafeV79() {
            const items = g(data0(), 'riskItems', []);
            if (items && items.length) return items.map((r) => ({ label: r.label || r.ten || r.name || '', value: val(r.value, '0'), css: r.css || 'risk-zero' }));
            return [
                { label: 'VI PHẠM ATGT', value: arrLenV79('tables.atgt'), css: 'risk-warn' },
                { label: 'VI PHẠM NỘI BỘ', value: arrLenV79('tables.noibo'), css: 'risk-warn' },
                { label: 'TAI NẠN/SỰ CỐ', value: arrLenV79('tables.tainan'), css: 'risk-warn' },
                { label: 'KHEN THƯỞNG', value: arrLenV79('tables.khenThuong'), css: 'risk-good' },
                { label: 'KỶ LUẬT', value: arrLenV79('tables.kyLuat'), css: 'risk-warn' },
                { label: 'HỒ SƠ LƯU TRỮ', value: arrLenV79('tables.hoso'), css: 'risk-record' }
            ];
        }

        /* ===== Library loaders ===== */
        async function ensurePdfLib() {
            if (window.html2canvas && window.jspdf) return;
            if (!state.pdfLibPromise) state.pdfLibPromise = Promise.all([window.html2canvas ? null : script(HTML2CANVAS_URL), window.jspdf ? null : script(JSPDF_URL)]);
            await state.pdfLibPromise;
        }
        async function ensureQrLib() { if (window.QRCode) return; if (!state.qrLibPromise) state.qrLibPromise = script(QRCODE_URL); await state.qrLibPromise; }

        function renderLoading() {
          app.innerHTML = `<div class="ns-a4 ns-loading-page">
            <div class="ns-a4-inner" style="display:flex;flex-direction:column;gap:6mm;">
              <div class="ns-skeleton" style="height:30mm;border-radius:8px;"></div>
              <div style="display:grid;grid-template-columns:1.7fr 1fr;gap:6mm;">
                <div class="ns-skeleton" style="height:62mm;"></div>
                <div class="ns-skeleton" style="height:62mm;"></div>
              </div>
              <div class="ns-skeleton" style="height:10mm;"></div>
              <div class="ns-skeleton" style="height:40mm;"></div>
              <div class="ns-skeleton" style="height:40mm;"></div>
              <div class="ns-loading-text"><span class="ns-spinner" style="border-top-color:#2563eb;border-color:#cfe0f5;"></span> Đang tải hồ sơ nhân sự...</div>
            </div>
          </div>`;
        }

        async function fetchProfile() {
            const id = clean(idInput.value);
            if (!id) { showMessage('Vui lòng nhập ID nhân sự, CCCD hoặc họ tên để tải hồ sơ.', 'error'); return; }
            const requestId = ++state.requestSeq;
            showMessage('');
            renderLoading();
            setBusy(true);
            try {
                const params = new URLSearchParams({ ID_NhanSu: id });
                const response = await fetch(`/api/nhan-su-profile?${params.toString()}`, { headers: { Accept: 'application/json' } });
                const text = await response.text();
                let payload = {};
                try { payload = text ? JSON.parse(text) : {}; } catch { throw new Error('API trả về HTML thay vì JSON. Khi chạy local, hãy chạy thêm npm run proxy cùng npm start, rồi tải lại trang.'); }
                if (!response.ok) throw new Error(payload.error || `Không tải được hồ sơ nhân sự (${response.status}).`);
                if (requestId !== state.requestSeq) return;
                state.bundle = payload;
                renderProfile(payload.profile);
                const resolvedId = clean(payload.profile?.idNhanSu) || id;
                idInput.value = resolvedId;
                window.history.replaceState(null, '', `/nhan_su_profile_standalone.html?ID_NhanSu=${encodeURIComponent(resolvedId)}`);
            } catch (error) {
                if (requestId !== state.requestSeq) return;
                state.bundle = null;
                app.innerHTML = '';

        const NS_CONTENT_W_MM = NS_PAGE_W_MM - NS_PAD_MM * 2;   // 190mm
        const NS_CONTENT_H_MM = NS_PAGE_H_MM - NS_PAD_MM * 2;   // 277mm

        function nsMeasureHeight(node) {
            const rect = node.getBoundingClientRect();
            const style = getComputedStyle(node);
            return rect.height + parseFloat(style.marginTop || 0) + parseFloat(style.marginBottom || 0);
        }

        function nsCloneTableWithRows(original, theadClone, rowNodes) {
            const clone = original.cloneNode(false);
            Array.from(original.attributes).forEach((attr) => clone.setAttribute(attr.name, attr.value));

            const tbody = document.createElement('tbody');
            rowNodes.forEach((r) => tbody.appendChild(r.cloneNode(true)));
            clone.appendChild(tbody);
            return clone;
        }

            sandbox.className = 'ns-measure';
            const content = document.createElement('div');
            content.className = 'ns-content';
            content.innerHTML = html;
            sandbox.appendChild(content);
            document.body.appendChild(sandbox);

            const pxPerMm = content.getBoundingClientRect().width / NS_CONTENT_W_MM;
            const pageHeightPx = (NS_CONTENT_H_MM - 6) * pxPerMm;   // chừa ~6mm lề dưới

            const pages = [[]];
            let curH = 0;
            const push = (node, h) => { if (curH + h > pageHeightPx && curH > 0) { pages.push([]); curH = 0; } pages[pages.length - 1].push(node); curH += h; };

            // Tạo một .module con (giữ viền + head) cho 1 nhóm hàng đã cắt.
            function moduleChunk(moduleNode, headNode, tableNode, thead, rowNodes, withHead) {
                const m = document.createElement('div');
                m.className = moduleNode.className;
                if (withHead && headNode) m.appendChild(headNode.cloneNode(true));
                const body = document.createElement('div');
                body.className = 'module-body';
                body.appendChild(nsCloneTableWithRows(tableNode, thead, rowNodes));
                m.appendChild(body);
                return m;
            }

            Array.from(content.children).forEach((block) => {
                const table = block.querySelector('table');
                const blockH = nsMeasureHeight(block);

                // Khối không bảng, hoặc module có bảng đủ ngắn: đặt trọn (sang trang mới nếu không vừa).
                if (!table || blockH <= pageHeightPx) {
                    push(block.cloneNode(true), blockH);
                    return;
                }

                // Module có bảng dài hơn 1 trang -> cắt thành nhiều module con theo hàng.
                const headNode = block.querySelector('.module-head');
                const headH = headNode ? nsMeasureHeight(headNode) : 0;
                const thead = table.querySelector('thead');
                const tbody = table.querySelector('tbody');
                const rows = tbody ? Array.from(tbody.children) : [];
                const theadH = thead ? nsMeasureHeight(thead) : 0;
                const frameH = 8; // hao viền/padding module-body

                // Nếu chỗ còn lại không đủ cho head + thead + 1 hàng thì sang trang mới.
                const firstRowH = rows[0] ? nsMeasureHeight(rows[0]) : 0;
                if (curH > 0 && curH + headH + theadH + firstRowH + frameH > pageHeightPx) { pages.push([]); curH = 0; }

                let firstChunk = true;
                let buffer = [];
                const overheadOf = () => (firstChunk ? headH : 0) + theadH + frameH;
                const bufHeight = () => buffer.reduce((s, r) => s + nsMeasureHeight(r), 0);
                const flush = () => {
                    if (!buffer.length) return;
                    const node = moduleChunk(block, headNode, table, thead, buffer, firstChunk);
                    pushNoCheck(node, overheadOf() + bufHeight());
                    firstChunk = false;
                    buffer = [];
                };

                rows.forEach((row) => {
                    const rowH = nsMeasureHeight(row);
                    if (curH + overheadOf() + bufHeight() + rowH > pageHeightPx && buffer.length > 0) {
                        flush();
                        pages.push([]); curH = 0;
                    }
                    buffer.push(row);
                });
                flush();
            });

            document.body.removeChild(sandbox);

            const valid = pages.filter((b) => b.length > 0);
            const total = valid.length;
            const pagesHtml = valid.map((blocks, index) => {
                const wrapper = document.createElement('div');
                blocks.forEach((n) => wrapper.appendChild(n));
                // .page giữ giao diện template; watermark cho các trang sau (trang đầu là cover).
                const wm = index === 0 ? '' : '<div class="wm">QLVT_TAXI123_HN</div>';
                // Số trang đặt ở khung ngoài .ns-a4 (không bị scale) để luôn nằm đúng đáy trang A4.
                return `<section class="ns-a4"><div class="ns-a4-inner page">${wm}${wrapper.innerHTML}</div><span class="ns-a4-num no-print">Trang ${index + 1}/${total}</span></section>`;
            }).join('');

            app.insertAdjacentHTML('beforeend', `<div class="doc ns-profile" id="docArea">${pagesHtml}</div>`);
            nsFitToWidth();
        }

        // Trang render ở kích thước thật 210mm (chữ nét). Nếu màn hình hẹp hơn, thu nhỏ CẢ trang
        // bằng zoom ở khung ngoài để vừa khung nhìn — không dùng transform trên nội dung (tránh mờ chữ),
        // và không ảnh hưởng PDF vì PDF chụp từng .ns-a4 ở kích thước thật.
        function nsFitToWidth() {
            if (!state.mmProbe) {
                const probe = document.createElement('div');
                probe.style.cssText = 'width:210mm;position:absolute;visibility:hidden';
                document.body.appendChild(probe);
                state.mmProbe = probe.getBoundingClientRect().width;
                document.body.removeChild(probe);
            }
            const avail = (app.clientWidth || window.innerWidth) - 8;
            const ratio = Math.min(1, avail / state.mmProbe);
            document.querySelectorAll('.ns-a4').forEach((page) => {
                page.style.zoom = ratio < 1 ? String(ratio) : '';
            });
        }
        window.addEventListener('resize', () => { if (document.querySelector('.ns-a4')) nsFitToWidth(); });

        async function renderQrIntoPage(profileUrl) {
            const wrap = document.getElementById('nsQrWrap');
            if (!wrap || !profileUrl) return;
            try {
                await ensureQrLib();
                const dataUrl = await window.QRCode.toDataURL(profileUrl, { width: 168, margin: 0, color: { dark: '#1f4e79', light: '#ffffff' } });
                wrap.outerHTML = `<a class="v53-qr-link" id="nsQrWrap" href="${escapeHtml(profileUrl)}" target="_blank" rel="noopener"><img class="v53-qr" src="${dataUrl}" alt="QR hồ sơ nhân sự"></a>`;
            } catch (error) { /* giữ chỗ trống nếu QR lỗi */ }
        }

        function fileName(profile) {
            const token = clean(profile?.hoTen || profile?.idNhanSu || 'NHANSU').replace(/\s+/g, '_').replace(/[\\/:*?"<>|.\-]/g, '').toUpperCase();
            return `HOSO_NHANSU_${token}.pdf`;
        }

        async function downloadPdf() {
            const profile = state.bundle?.profile;
            const docArea = document.getElementById('docArea');
            const pageNodes = docArea ? Array.from(docArea.querySelectorAll('.ns-a4')) : [];
            if (!profile || !docArea || pageNodes.length === 0) return;
            state.loadingPdf = true;
            setBusy(false);
            pdfOverlay.hidden = false;
            document.body.classList.add('ns-pdf-export');
            await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
            try {
                await ensurePdfLib();
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
                const A4_W = 210;
                const A4_H = 297;
                for (let i = 0; i < pageNodes.length; i++) {
                    const pageNode = pageNodes[i];
                    const inner = pageNode.querySelector('.ns-a4-inner');
                    // Chụp ở kích thước thật 210mm (bỏ zoom/scale) cho ảnh nét, sau đó khôi phục.
                    const prevWidth = pageNode.style.width;
                    const prevZoom = pageNode.style.zoom;
                    const prevTransform = inner ? inner.style.transform : '';
                    pageNode.style.width = '210mm';
                    pageNode.style.zoom = '';
                    if (inner) inner.style.transform = 'none';
                    const canvas = await window.html2canvas(pageNode, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
                    const qrLink = pageNode.querySelector('#nsQrWrap');
                    let qrBox = null;
                    if (qrLink && qrLink.getAttribute && qrLink.getAttribute('href')) {
                        const pr = pageNode.getBoundingClientRect();
                        const qr = qrLink.getBoundingClientRect();
                        const mmPerPx = A4_W / pr.width;
                        qrBox = { x: (qr.left - pr.left) * mmPerPx, y: (qr.top - pr.top) * mmPerPx, w: qr.width * mmPerPx, h: qr.height * mmPerPx, url: qrLink.getAttribute('href') };
                    }
                    pageNode.style.width = prevWidth;
                    pageNode.style.zoom = prevZoom;
                    if (inner) inner.style.transform = prevTransform || '';
                    const imgData = canvas.toDataURL('image/jpeg', 0.96);
                    if (i > 0) pdf.addPage('a4', 'portrait');
                    pdf.addImage(imgData, 'JPEG', 0, 0, A4_W, A4_H);
                    if (qrBox) pdf.link(qrBox.x, qrBox.y, qrBox.w, qrBox.h, { url: qrBox.url });
                }
                pdf.save(fileName(profile));
            } catch (error) {
                showMessage(`Không tải được PDF tự động: ${error.message}. Có thể dùng lệnh In của trình duyệt để lưu PDF.`, 'warn');
                window.print();
            } finally {
                document.body.classList.remove('ns-pdf-export');
                pdfOverlay.hidden = true;
                state.loadingPdf = false;
                setBusy(false);
            }
        }

        loadButton.addEventListener('click', fetchProfile);
        pdfButton.addEventListener('click', downloadPdf);
        idInput.addEventListener('keydown', (event) => { if (event.key === 'Enter') fetchProfile(); });

        idInput.value = getParam(['ID_NhanSu', 'idNhanSu', 'idnhansu', 'IDNhanSu', 'id', 'ID']);
        if (idInput.value) fetchProfile();
    </script>
</body>
